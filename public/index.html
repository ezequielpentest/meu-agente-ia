  </style>

<body>

<div class="login-container" id="loginContainer">
  <div class="login-box">
    <div class="login-icon">⚡</div>
    <div class="login-title">PENTEST FORGE</div>
    <div class="login-sub">◆ CYBER SQUAD ◆</div>
    
    <div class="input-group">
      <label>🔐 USUÁRIO</label>
      <input type="text" id="username" placeholder="Usuário" autocomplete="off">
    </div>
    
    <div class="input-group">

      <input type="password" id="password" placeholder="••••••••">
    </div>

      <span class="status-dot"></span> ACESSO NEGADO • Credenciais inválidas
    </div>
  </div>
</div>

<div id="root"></div>

<script type="module">
import { createElement as h, useState, useRef, useEffect, Fragment } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

// ============= SISTEMA DE LOGIN COM API (SEM CREDENCIAIS NO FRONTEND) =============
async function authenticate(username, password) {
  try {
    const response = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    return { success: response.ok && data.success, data };
  } catch (error) {
    console.error('Erro na autenticação:', error);
    return { success: false, data: null };
  }
}

function initLogin() {
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  
  function showError() {
    errorMsg.classList.add('show');
    usernameInput.style.borderColor = '#ff4444';
    passwordInput.style.borderColor = '#ff4444';
    setTimeout(() => {
      errorMsg.classList.remove('show');
      usernameInput.style.borderColor = '';
      passwordInput.style.borderColor = '';
    }, 3000);
  }
  
  async function attemptLogin() {
    const user = usernameInput.value.trim();
    const pass = passwordInput.value;
    
    if (!user || !pass) {
      showError();
      return;
    }
    
    loginBtn.disabled = true;
    loginBtn.textContent = '▶ VERIFICANDO...';
    
    const { success } = await authenticate(user, pass);
    
    if (success) {
      // Sessão de 8 HORAS (28800000 ms)
      sessionStorage.setItem('auth_user', user);
      sessionStorage.setItem('auth_time', Date.now().toString());
      
      document.body.classList.add('app-loaded');
      initApp();
    } else {
      showError();
      passwordInput.value = '';
      passwordInput.focus();
    }
    
    loginBtn.disabled = false;
    loginBtn.textContent = '▶ ACESSAR SISTEMA';
  }
  
  loginBtn.addEventListener('click', attemptLogin);
  
  usernameInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') passwordInput.focus();
  });
  
  passwordInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') attemptLogin();
  });
  
  // Verifica sessão existente (8 HORAS = 28800000 ms)
  const authUser = sessionStorage.getItem('auth_user');
  const authTime = sessionStorage.getItem('auth_time');
  if (authUser && authTime && (Date.now() - parseInt(authTime) < 28800000)) {
    document.body.classList.add('app-loaded');
    initApp();
  }
  
  usernameInput.focus();
}

// ============= AGENTS DATA =============
const AGENTS = [
  { id: "dispatch", name: "NEXUS", role: "Mission Dispatcher", team: "core", icon: "🧬", color: "#00ff88", specialty: "Analisa situações e despacha o agente especialista correto." },
  { id: "commander", name: "Rex", role: "Squad Commander", team: "red", icon: "⚔️", color: "#ff4444", specialty: "Estratégia ofensiva, metodologias PTES/OWASP." },
  { id: "ghost", name: "Ghost", role: "Recon & OSINT", team: "red", icon: "👁️", color: "#ff6600", specialty: "OSINT avançado, Shodan, theHarvester, Maltego." },
  { id: "phantom", name: "Phantom", role: "Web Exploitation", team: "red", icon: "🕸️", color: "#ff8800", specialty: "SQLi, XSS, LFI, Burp Suite, OWASP Top 10." },
  { id: "shadow", name: "Shadow", role: "Network Pentester", team: "red", icon: "🌐", color: "#ff5500", specialty: "Nmap, enumeração de serviços, pivoting." },
  { id: "viper", name: "Viper", role: "Exploit Dev", team: "red", icon: "🐍", color: "#dd2200", specialty: "Desenvolvimento de exploits, CVEs, Searchsploit." },
  { id: "cipher", name: "Cipher", role: "Password Attacks", team: "red", icon: "🔐", color: "#cc3300", specialty: "Hydra, Hashcat, John the Ripper." },
  { id: "wraith", name: "Wraith", role: "Post-Exploitation", team: "red", icon: "💀", color: "#ff1100", specialty: "Meterpreter, shells, persistência." },
  { id: "dominator", name: "Dominator", role: "Active Directory", team: "red", icon: "🏛️", color: "#ee3300", specialty: "Kerberoasting, BloodHound, DCSync." },
  { id: "bof", name: "B0F", role: "Buffer Overflow", team: "specialist", icon: "🧠", color: "#ff44aa", specialty: "Buffer Overflow, fuzzing, shellcode." },
  { id: "privesc", name: "Escalon", role: "Privilege Escalation", team: "specialist", icon: "🔑", color: "#ffcc00", specialty: "Linux/Windows privesc, LinPEAS, WinPEAS." },
  { id: "tux", name: "Tux", role: "Linux Expert", team: "specialist", icon: "🐧", color: "#00cc44", specialty: "Linux avançado, bash, Kali Linux." },
  { id: "syntax", name: "Syntax", role: "Scripting & Dev", team: "specialist", icon: "💻", color: "#aa44ff", specialty: "Python3, Bash, PowerShell, automação." },
  { id: "scribe", name: "Scribe", role: "Report Writer", team: "specialist", icon: "📝", color: "#88aaff", specialty: "Relatórios DCPT/OSCP, CVSS scoring." },
  { id: "gitops", name: "GitOps", role: "GitHub Agent", team: "core", icon: "🐙", color: "#8844ee", specialty: "Markdown para GitHub." },
  { id: "forge", name: "Forge", role: "AppSec", team: "blue", icon: "⚙️", color: "#0055cc", specialty: "Code review, SAST/DAST." },
  { id: "atlas", name: "Atlas", role: "Incident Response", team: "blue", icon: "🚨", color: "#0077ee", specialty: "Forensics, análise de malware." },
  { id: "sentinel", name: "Sentinel", role: "Blue Team", team: "blue", icon: "🛡️", color: "#0088ff", specialty: "IDS/IPS, firewall, hardening." },
];

const REPOS = [
  { name: "ezequielpentest/scripts", url: "https://github.com/ezequielpentest/scripts", desc: "Scripts de pentest", prompt: "Cria um script Python para meu repositório scripts" },
  { name: "ezequielpentest/htb-writeups", url: "https://github.com/ezequielpentest/htb-writeups", desc: "Writeups HTB", prompt: "Escreve um writeup HTB formatado" },
  { name: "ezequielpentest/pentest-notas", url: "https://github.com/ezequielpentest/pentest-notas", desc: "Notas de pentest", prompt: "Gera notas de módulo Desec" },
];

const AGENT_MAP = AGENTS.reduce((acc, a) => { acc[a.id] = a; return acc; }, {});
const TEAM_ORDER = ["core", "red", "specialist", "blue"];
const TEAM_LABELS = { core: "◆ CORE", red: "◆ RED TEAM", specialist: "◆ SPECIALISTS", blue: "◆ BLUE TEAM" };
const TEAM_COLORS = { core: "#00ff88", red: "#ff4444", specialist: "#ffaa00", blue: "#0088ff" };
const QUICK_PROMPTS = [
  "Web application reconnaissance: best approach?"
"Linux privilege escalation after initial foothold"
"Manual SQL injection exploitation deep dive"
"Writing professional HTB writeups for portfolio"
"Post-exploitation checklist after shell access"
"Python automation for security testing workflows"
"Active Directory enumeration methodology"
];

const DISPATCHER_SYSTEM = `Você é NEXUS, dispatcher de elite do squad de pentest.
Responda SEMPRE em português brasileiro com formato JSON:
{
  "agents": ["agent_id"],
  "conversation": [{"agent": "agent_id", "message": "resposta técnica"}]
}`;

async function callAPI(messages) {
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1500,
      system: DISPATCHER_SYSTEM,
      messages,
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || data.error);
  return data.content?.[0]?.text || "";
}

function renderMD(text) {
  if (!text) return '';
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) => '<pre>' + c + '</pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<b style="color:#00ff88">$1</b>');
  t = t.replace(/^#{1,3} (.+)$/gm, '<div class="md-h">$1</div>');
  t = t.replace(/^- (.+)$/gm, '<div class="md-li">▸ $1</div>');
  t = t.replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>');
  return t;
}

function App() {
  const [messages, setMessages] = useState([{ type: "system", content: "NEXUS online. Descreva sua situação." }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeAgents, setActiveAgents] = useState([AGENT_MAP["dispatch"]]);
  const [sidebarTab, setSidebarTab] = useState("agents");
  const [search, setSearch] = useState("");
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  async function sendMessage() {
    if (!input.trim() || loading) return;
    const userText = input.trim();
    setInput("");
    setMessages(prev => [...prev, { type: "user", content: userText }]);
    setLoading(true);

    try {
      const history = messages.filter(m => m.type === "user" || m.type === "agent_conversation").map(m => 
        m.type === "user" ? { role: "user", content: m.content } : { role: "assistant", content: JSON.stringify(m.raw || "") }
      );
      history.push({ role: "user", content: userText });

      const raw = await callAPI(history);
      let parsed;
      try {
        const match = raw.match(/\{[\s\S]*\}/);
        parsed = JSON.parse(match ? match[0] : raw);
      } catch {
        parsed = { agents: ["dispatch"], conversation: [{ agent: "dispatch", message: raw }] };
      }

      const involved = (parsed.agents || []).map(id => AGENT_MAP[id]).filter(Boolean);
      if (involved.length > 0) setActiveAgents(involved);
      setMessages(prev => [...prev, { type: "agent_conversation", agents: parsed.agents || [], conversation: parsed.conversation || [], raw: parsed }]);
    } catch (err) {
      setMessages(prev => [...prev, { type: "agent_conversation", agents: ["dispatch"], conversation: [{ agent: "dispatch", message: `Erro: ${err.message}` }], raw: {} }]);
    }
    setLoading(false);
    inputRef.current?.focus();
  }

  const filteredAgents = AGENTS.filter(a => !search || [a.name, a.role, a.specialty].some(s => s.toLowerCase().includes(search.toLowerCase())));

  return h('div', { style: { height: '100vh', display: 'flex', flexDirection: 'column', background: '#050508', overflow: 'hidden' } },
    h('div', { style: { background: '#0a0a14', borderBottom: '1px solid #0a2a0a', padding: '0 20px', height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 } },
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
        h('div', { style: { width: 36, height: 36, borderRadius: 8, background: 'linear-gradient(135deg,#00ff88,#0088ff)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 } }, '⚡'),
        h('div', null,
          h('div', { style: { fontSize: 15, fontWeight: 900, color: '#00ff88', fontFamily: "'Orbitron',monospace" } }, 'PENTEST FORGE'),
          h('div', { style: { fontSize: 9, color: '#334433' } }, ` • ${AGENTS.length} AGENTES`)
        )
      ),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
        ...activeAgents.slice(0, 3).map(a =>
          h('div', { key: a.id, style: { display: 'flex', alignItems: 'center', gap: 5 } },
            h('div', { className: 'pulse', style: { width: 6, height: 6, borderRadius: '50%', background: a.color } }),
            h('span', { style: { fontSize: 9, color: a.color } }, a.name)
          )
        )
      ),
      h('div', { style: { fontSize: 10, color: '#00ff88' } }, '🟢 OPERACIONAL')
    ),
    h('div', { style: { display: 'flex', flex: 1, overflow: 'hidden' } },
      h('div', { style: { width: 210, background: '#030306', borderRight: '1px solid #0a1a0a', display: 'flex', flexDirection: 'column', flexShrink: 0 } },
        h('div', { style: { display: 'flex', borderBottom: '1px solid #0a1a0a' } },
          ...['agents', 'repos'].map(tab => h('button', { key: tab, onClick: () => setSidebarTab(tab), style: { flex: 1, padding: '9px 0', background: sidebarTab === tab ? '#0a1a0a' : 'transparent', color: sidebarTab === tab ? '#00ff88' : '#334', fontSize: 10, borderBottom: sidebarTab === tab ? '2px solid #00ff88' : '2px solid transparent', cursor: 'pointer', fontFamily: 'inherit' } }, tab))
        ),
        sidebarTab === 'agents' ? h(Fragment, null,
          h('div', { style: { padding: '8px' } },
            h('input', { value: search, onChange: e => setSearch(e.target.value), placeholder: 'buscar...', style: { width: '100%', background: '#0a0a0f', border: '1px solid #0a2a0a', borderRadius: 4, padding: '5px 8px', color: '#668866', fontSize: 10, fontFamily: 'inherit', outline: 'none' } })
          ),
          h('div', { style: { flex: 1, overflowY: 'auto' } },
            ...TEAM_ORDER.map(team => {
              const agents = filteredAgents.filter(a => a.team === team);
              if (!agents.length) return null;
              return h('div', { key: team },
                h('div', { style: { padding: '8px 10px 4px', fontSize: 8, color: TEAM_COLORS[team] } }, TEAM_LABELS[team]),
                ...agents.map(agent => {
                  const isActive = activeAgents.some(a => a.id === agent.id);
                  return h('div', { key: agent.id, style: { display: 'flex', alignItems: 'center', gap: 7, padding: '7px 10px', background: isActive ? agent.color + '10' : 'transparent', borderLeft: isActive ? `2px solid ${agent.color}` : '2px solid transparent' } },
                    h('div', { style: { width: 22, height: 22, borderRadius: 4, background: agent.color + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11 } }, agent.icon),
                    h('div', { style: { flex: 1 } },
                      h('div', { style: { fontSize: 11, color: isActive ? agent.color : '#667766', fontWeight: 'bold' } }, agent.name),
                      h('div', { style: { fontSize: 9, color: '#334433' } }, agent.role)
                    )
                  );
                })
              );
            })
          )
        ) : h('div', { style: { padding: 10 } },
          ...REPOS.map(repo => h('div', { key: repo.name, style: { background: '#0a0a14', border: '1px solid #1a1a3a', borderRadius: 8, padding: 10, marginBottom: 8 } },
            h('div', { style: { fontSize: 10, color: '#8844ee', fontWeight: 'bold' } }, repo.name),
            h('div', { style: { fontSize: 9, color: '#445', margin: '4px 0' } }, repo.desc),
            h('button', { onClick: () => { setInput(repo.prompt); inputRef.current?.focus(); }, style: { fontSize: 9, color: '#00ff88', background: 'none', border: '1px solid #00ff8833', borderRadius: 3, padding: '2px 6px', cursor: 'pointer' } }, '+ usar')
          ))
        )
      ),
      h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' } },
        h('div', { style: { flex: 1, overflowY: 'auto', padding: '16px 20px' } },
          messages.length === 1 && h('div', { style: { textAlign: 'center', marginBottom: 24 } },
            h('div', { style: { fontSize: 40, marginBottom: 8 } }, '🧬'),
            h('div', { style: { fontSize: 14, color: '#00ff88', fontFamily: "'Orbitron',monospace" } }, 'NEXUS DISPATCHER'),
            h('div', { style: { fontSize: 11, color: '#445', marginTop: 8 } }, 'Descreva sua situação. O sistema identifica o agente ideal.'),
            h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, maxWidth: 500, margin: '20px auto 0' } },
              ...QUICK_PROMPTS.slice(0, 4).map(p => h('button', { key: p, onClick: () => { setInput(p); inputRef.current?.focus(); }, style: { background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 6, padding: '8px', fontSize: 10, color: '#556677', cursor: 'pointer' } }, p))
            )
          ),
          ...messages.map((msg, idx) => {
            if (msg.type === 'system') return h('div', { key: idx, style: { textAlign: 'center', marginBottom: 16 } }, h('span', { style: { fontSize: 10, color: '#334433', background: '#0a1a0a', padding: '3px 12px', borderRadius: 20 } }, `🧬 ${msg.content}`));
            if (msg.type === 'user') return h('div', { key: idx, style: { display: 'flex', justifyContent: 'flex-end', marginBottom: 16 } }, h('div', { style: { maxWidth: '70%', background: '#0a1a0a', border: '1px solid #1a3a1a', borderRadius: 10, padding: '10px 14px', fontSize: 12, color: '#aaccaa' } }, msg.content));
            if (msg.type === 'agent_conversation') {
              return h('div', { key: idx, style: { marginBottom: 16 } },
                ...(msg.conversation || []).map((conv, ci) => {
                  const agent = AGENT_MAP[conv.agent] || AGENT_MAP['dispatch'];
                  return h('div', { key: ci, style: { display: 'flex', gap: 10, marginBottom: 12 } },
                    h('div', { style: { width: 34, height: 34, borderRadius: 8, background: agent.color + '20', border: `1px solid ${agent.color}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 } }, agent.icon),
                    h('div', { style: { flex: 1, background: '#08080e', border: `1px solid ${agent.color}25`, borderRadius: 10, padding: '10px 14px' } },
                      h('div', { style: { fontSize: 10, color: agent.color, fontWeight: 'bold', marginBottom: 6 } }, agent.name),
                      h('div', { dangerouslySetInnerHTML: { __html: renderMD(conv.message) }, style: { fontSize: 12, color: '#b0c0b0', lineHeight: 1.6 } })
                    )
                  );
                })
              );
            }
            return null;
          }),
          loading && h('div', { style: { display: 'flex', gap: 10, alignItems: 'center', marginBottom: 16 } },
            h('div', { style: { width: 34, height: 34, borderRadius: 8, background: '#00ff8815', border: '1px solid #00ff8840', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 } }, '🧬'),
            h('div', { style: { background: '#08080e', border: '1px solid #00ff8820', borderRadius: 10, padding: '10px 14px' } },
              h('div', { style: { fontSize: 10, color: '#00ff88' } }, 'NEXUS processando...')
            )
          ),
          h('div', { ref: bottomRef })
        ),
        h('div', { style: { padding: '12px 20px', borderTop: '1px solid #0a2a0a' } },
          h('div', { style: { display: 'flex', gap: 10 } },
            h('input', { ref: inputRef, value: input, onChange: e => setInput(e.target.value), onKeyDown: e => e.key === 'Enter' && sendMessage(), placeholder: 'Descreva sua situação...', style: { flex: 1, background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 8, padding: '11px 14px', color: '#aaccaa', fontSize: 12, fontFamily: 'inherit', outline: 'none' } }),
            h('button', { onClick: sendMessage, disabled: loading, style: { padding: '11px 22px', borderRadius: 8, border: '1px solid #00ff8840', background: loading ? '#08080e' : 'linear-gradient(135deg,#001a00,#0a2a0a)', color: loading ? '#334433' : '#00ff88', cursor: loading ? 'not-allowed' : 'pointer', fontSize: 11, fontFamily: "'Orbitron',monospace", fontWeight: 'bold' } }, loading ? '...' : 'ENVIAR')
          )
        )
      )
    )
  );
}

function initApp() {
  createRoot(document.getElementById('root')).render(h(App));
}

initLogin();
</script>
</body>
</html>
