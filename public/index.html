<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pentest Forge</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; font-family: 'Share Tech Mono', monospace; height: 100vh; overflow: hidden; }
    #root { height: 100vh; }
    pre { background: #0a0f0a; border: 1px solid #1a3a1a; border-radius: 6px; padding: 12px; overflow-x: auto; color: #00ff88; font-size: 11px; margin: 8px 0; }
    code { background: #0a0f0a; color: #00ff88; padding: 2px 5px; border-radius: 3px; font-size: 11px; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { createElement as h, useState, useRef, useEffect } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

// AGENTS
const AGENTS = [
  { id: "syntax", name: "Syntax", role: "Developer", icon: "💻", color: "#aa44ff" },
  { id: "phantom", name: "Phantom", role: "Web Exploitation", icon: "🕸️", color: "#ff8800" },
  { id: "shadow", name: "Shadow", role: "Network", icon: "🌐", color: "#ff5500" },
  { id: "privesc", name: "Escalon", role: "Privesc", icon: "🔑", color: "#ffcc00" },
  { id: "ghost", name: "Ghost", role: "OSINT", icon: "👁️", color: "#ff6600" },
];

const QUICK_PROMPTS = [
  "Web application reconnaissance: best approach?",
  "Linux privilege escalation after initial foothold",
  "Manual SQL injection exploitation deep dive",
  "Post-exploitation checklist after shell access",
  "Python automation for security testing",
  "Active Directory enumeration methodology"
];

// SIMULA RESPOSTA (funciona sem API)
async function getResponse(userMessage) {
  await new Promise(r => setTimeout(r, 800));
  
  const lowerMsg = userMessage.toLowerCase();
  
  if (lowerMsg.includes("recon") || lowerMsg.includes("reconhecimento")) {
    return { agent: "ghost", message: "**Reconnaissance Web:**\n```bash\n# Subdomain enumeration\namass enum -d target.com\n\n# Directory fuzzing\ngobuster dir -u https://target.com -w /usr/share/wordlists/dirb/common.txt\n\n# Technology detection\nwhatweb https://target.com\n```" };
  }
  
  if (lowerMsg.includes("sql") || lowerMsg.includes("injection")) {
    return { agent: "phantom", message: "**SQL Injection Manual:**\n1. Teste inicial: `' OR '1'='1`\n2. Union based: `' UNION SELECT null, version()--`\n3. Blind: `' AND SLEEP(5)--`\n4. Time-based: `' AND (SELECT * FROM (SELECT(SLEEP(5)))a)--`" };
  }
  
  if (lowerMsg.includes("privilegio") || lowerMsg.includes("privesc") || lowerMsg.includes("escalar")) {
    return { agent: "privesc", message: "**Linux Privilege Escalation:**\n```bash\n# Check sudo privileges\nsudo -l\n\n# Find SUID binaries\nfind / -perm -4000 2>/dev/null\n\n# Check writable files\nfind / -writable -type f 2>/dev/null\n\n# Run LinPEAS\ncurl -L https://github.com/peass-ng/PEASS-ng/releases/download/20241021/linpeas.sh | sh\n```" };
  }
  
  if (lowerMsg.includes("post") || lowerMsg.includes("shell")) {
    return { agent: "shadow", message: "**Post-Exploitation Checklist:**\n```bash\n# Upgrade shell\npython3 -c 'import pty;pty.spawn(\"/bin/bash\")'\n\n# Persistence via SSH\nssh-keygen -t rsa -b 4096\ncat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys\n\n# Lateral movement\nssh user@target\n\n# Clear logs\nhistory -c\nrm -rf ~/.bash_history\n```" };
  }
  
  if (lowerMsg.includes("python") || lowerMsg.includes("script")) {
    return { agent: "syntax", message: "**Python Automation Script:**\n```python\n#!/usr/bin/env python3\nimport requests\nimport sys\n\ndef scan_subdomains(domain):\n    subdomains = ['www', 'mail', 'ftp', 'admin', 'dev']\n    for sub in subdomains:\n        url = f\"http://{sub}.{domain}\"\n        try:\n            r = requests.get(url, timeout=3)\n            print(f\"[+] {url} - {r.status_code}\")\n        except:\n            pass\n\nif __name__ == \"__main__\":\n    if len(sys.argv) > 1:\n        scan_subdomains(sys.argv[1])\n```" };
  }
  
  return { agent: "syntax", message: "**Nmap Scan:**\n```bash\nnmap -sV -sC -p- target.com\n```\n**Flags:**\n- `-sV`: Service version detection\n- `-sC`: Default scripts\n- `-p-`: All 65535 ports" };
}

function renderMD(text) {
  if (!text) return '';
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) => '<pre>' + code + '</pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<b style="color:#00ff88">$1</b>');
  t = t.replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>');
  return t;
}

const AGENT_MAP = Object.fromEntries(AGENTS.map(a => [a.id, a]));

function App() {
  const [messages, setMessages] = useState([{ type: "system", content: "NEXUS online. Como posso ajudar?" }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeAgent, setActiveAgent] = useState(AGENTS[0]);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  async function sendMessage() {
    if (!input.trim() || loading) return;
    const userText = input.trim();
    setInput("");
    setMessages(prev => [...prev, { type: "user", content: userText }]);
    setLoading(true);

    try {
      const response = await getResponse(userText);
      const agent = AGENT_MAP[response.agent] || AGENTS[0];
      setActiveAgent(agent);
      setMessages(prev => [...prev, { type: "agent", agent: response.agent, message: response.message }]);
    } catch (err) {
      setMessages(prev => [...prev, { type: "agent", agent: "syntax", message: `Erro: ${err.message}` }]);
    }
    setLoading(false);
    inputRef.current?.focus();
  }

  return h('div', { style: { height: '100vh', display: 'flex', flexDirection: 'column', background: '#050508' } },
    h('div', { style: { background: '#0a0a14', borderBottom: '1px solid #0a2a0a', padding: '16px 20px' } },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
        h('div', null,
          h('div', { style: { fontSize: 18, fontWeight: 'bold', color: '#00ff88', fontFamily: "'Orbitron',monospace" } }, '⚡ PENTEST FORGE'),
          h('div', { style: { fontSize: 9, color: '#334433', marginTop: 4 } }, 'CYBER SQUAD • AI AGENTS')
        ),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
          h('div', { className: 'pulse', style: { width: 8, height: 8, borderRadius: '50%', background: activeAgent.color } }),
          h('span', { style: { fontSize: 10, color: activeAgent.color } }, activeAgent.name)
        )
      )
    ),
    h('div', { style: { flex: 1, overflowY: 'auto', padding: '20px', display: 'flex', flexDirection: 'column', gap: 16 } },
      messages.map((msg, idx) => {
        if (msg.type === 'system') {
          return h('div', { key: idx, style: { textAlign: 'center' } }, 
            h('span', { style: { fontSize: 11, color: '#334433', background: '#0a1a0a', padding: '4px 12px', borderRadius: 20 } }, `🧬 ${msg.content}`)
          );
        }
        if (msg.type === 'user') {
          return h('div', { key: idx, style: { display: 'flex', justifyContent: 'flex-end' } }, 
            h('div', { style: { maxWidth: '70%', background: '#0a1a0a', border: '1px solid #1a3a1a', borderRadius: 12, padding: '10px 14px', fontSize: 12, color: '#aaccaa' } }, msg.content)
          );
        }
        const agent = AGENT_MAP[msg.agent] || AGENTS[0];
        return h('div', { key: idx, style: { display: 'flex', gap: 10 } },
          h('div', { style: { width: 36, height: 36, borderRadius: 8, background: agent.color + '20', border: `1px solid ${agent.color}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 } }, agent.icon),
          h('div', { style: { flex: 1, background: '#08080e', border: `1px solid ${agent.color}30`, borderRadius: 12, padding: '12px' } },
            h('div', { style: { fontSize: 11, color: agent.color, fontWeight: 'bold', marginBottom: 6 } }, `${agent.name} • ${agent.role}`),
            h('div', { dangerouslySetInnerHTML: { __html: renderMD(msg.message) }, style: { fontSize: 12, color: '#b0c0b0', lineHeight: 1.6 } })
          )
        );
      }),
      loading && h('div', { style: { display: 'flex', gap: 10 } },
        h('div', { style: { width: 36, height: 36, borderRadius: 8, background: '#00ff8815', border: '1px solid #00ff8840', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 } }, '🧬'),
        h('div', { style: { background: '#08080e', border: '1px solid #00ff8820', borderRadius: 12, padding: '12px' } }, 
          h('div', { style: { fontSize: 10, color: '#00ff88' } }, 'NEXUS processando...')
        )
      ),
      h('div', { ref: bottomRef })
    ),
    h('div', { style: { padding: '16px 20px', borderTop: '1px solid #0a2a0a' } },
      h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 12 } },
        ...QUICK_PROMPTS.slice(0, 4).map(p => 
          h('button', { key: p, onClick: () => { setInput(p); inputRef.current?.focus(); }, style: { background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 15, padding: '4px 10px', fontSize: 9, color: '#556677', cursor: 'pointer' } }, p.slice(0, 35) + '...')
        )
      ),
      h('div', { style: { display: 'flex', gap: 10 } },
        h('input', { ref: inputRef, value: input, onChange: e => setInput(e.target.value), onKeyDown: e => e.key === 'Enter' && sendMessage(), placeholder: 'Descreva sua situação...', style: { flex: 1, background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 8, padding: '12px', color: '#aaccaa', fontSize: 12, fontFamily: 'monospace', outline: 'none' } }),
        h('button', { onClick: sendMessage, disabled: loading, style: { padding: '12px 24px', borderRadius: 8, border: '1px solid #00ff8840', background: loading ? '#08080e' : '#001a00', color: loading ? '#334433' : '#00ff88', cursor: loading ? 'not-allowed' : 'pointer', fontSize: 11, fontWeight: 'bold', fontFamily: "'Orbitron',monospace" } }, 'ENVIAR')
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
