<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Pentest Forge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; font-family: 'Share Tech Mono', monospace; min-height: 100vh; }
    
    /* Login */
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #0a0a14 0%, #020204 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }
    .login-box {
      background: #08080e;
      border: 1px solid #0a2a0a;
      border-radius: 16px;
      padding: 30px 20px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 0 60px rgba(0,255,136,0.1);
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-icon { text-align: center; font-size: 48px; margin-bottom: 16px; }
    .login-title { text-align: center; font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; letter-spacing: 2px; color: #00ff88; margin-bottom: 6px; }
    .login-sub { text-align: center; font-size: 9px; color: #334433; letter-spacing: 2px; margin-bottom: 24px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 9px; color: #00ff88; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
    .input-group input { width: 100%; background: #0a0a0f; border: 1px solid #0a2a0a; border-radius: 8px; padding: 10px 12px; color: #aaccaa; font-size: 13px; font-family: 'Share Tech Mono', monospace; outline: none; }
    .input-group input:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0,255,136,0.2); }
    .login-btn { width: 100%; background: linear-gradient(135deg, #001a00, #0a2a0a); border: 1px solid #00ff8840; border-radius: 8px; padding: 10px; color: #00ff88; font-family: 'Orbitron', monospace; font-size: 12px; font-weight: bold; letter-spacing: 2px; cursor: pointer; margin-top: 8px; }
    .login-btn:hover:not(:disabled) { background: linear-gradient(135deg, #002a00, #0a3a0a); border-color: #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.3); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: #330000; border: 1px solid #ff4444; border-radius: 6px; padding: 6px 10px; font-size: 10px; color: #ff8888; text-align: center; margin-top: 12px; display: none; }
    .error-msg.show { display: block; animation: shake 0.3s ease; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ff4444; animation: pulse 1.5s infinite; margin-right: 6px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    #root { display: none; height: 100vh; overflow: hidden; }
    body.app-loaded #root { display: block; }
    body.app-loaded .login-container { opacity: 0; visibility: hidden; pointer-events: none; }
    
    /* Markdown */
    .md-h { color:#00ff88; font-weight:bold; margin:10px 0 4px; font-size:13px; }
    .md-li { padding-left:14px; margin:3px 0; color:#aaccaa; }
    pre { background: #0a0f0a; border: 1px solid #1a3a1a; border-radius: 6px; padding: 10px; overflow-x: auto; color: #00ff88; font-size: 10px; margin: 8px 0; white-space: pre-wrap; word-break: break-word; }
    code { background: #0a0f0a; color: #00ff88; padding: 2px 5px; border-radius: 3px; font-size: 10px; }
    .quick-btn:hover { background: #001a00 !important; color: #00ff88 !important; border-color: #00ff8844 !important; }
    
    /* Mobile adjustments */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -260px; transition: left 0.3s ease; z-index: 100; width: 260px; height: 100%; background: #030306; border-right: 1px solid #0a1a0a; }
      .sidebar.open { left: 0; }
      .menu-toggle { display: flex; position: fixed; bottom: 20px; left: 20px; z-index: 101; background: #00ff8820; border: 1px solid #00ff8840; border-radius: 50%; width: 48px; height: 48px; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); }
      .content-area { width: 100%; }
      .chat-area { padding: 12px; }
      .agent-name-mobile { display: block; font-size: 10px; }
      .quick-buttons-grid { grid-template-columns: 1fr !important; gap: 6px !important; }
    }
    @media (min-width: 769px) {
      .menu-toggle { display: none; }
      .sidebar { position: relative; left: 0 !important; width: 240px; }
    }
    
    .menu-toggle { display: none; background: #00ff8820; border: 1px solid #00ff8840; border-radius: 50%; width: 48px; height: 48px; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); }
    .clear-chat-btn { background: #330000; border: 1px solid #ff4444; border-radius: 6px; padding: 6px 10px; font-size: 10px; color: #ff8888; cursor: pointer; font-family: inherit; margin-left: 8px; }
    .clear-chat-btn:hover { background: #550000; }
    .agent-selector { display: flex; align-items: center; gap: 8px; background: #0a0a14; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>

<div class="login-container" id="loginContainer">
  <div class="login-box">
    <div class="login-icon">⚡</div>
    <div class="login-title">PENTEST FORGE</div>
    <div class="login-sub">◆ CYBER SQUAD ◆</div>
    <div class="input-group">
      <label>🔐 USER</label>
      <input type="text" id="username" placeholder="User" autocomplete="off">
    </div>
    <div class="input-group">
      <label>🗝️ PASSWORD</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="loginBtn">▶ System Access</button>
    <div class="error-msg" id="errorMsg">
      <span class="status-dot"></span> ACCESS DENIED • Invalid credentials
    </div>
  </div>
</div>

<div id="root"></div>

<script type="module">
import { createElement as h, useState, useRef, useEffect, Fragment } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

// ============= CREDENCIAIS =============
const VALID_USERNAME = "admin";
const VALID_PASSWORD = "123456";

function initLogin() {
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  
  function showError() {
    errorMsg.classList.add('show');
    usernameInput.style.borderColor = '#ff4444';
    passwordInput.style.borderColor = '#ff4444';
    setTimeout(() => {
      errorMsg.classList.remove('show');
      usernameInput.style.borderColor = '';
      passwordInput.style.borderColor = '';
    }, 3000);
  }
  
  function attemptLogin() {
    const user = usernameInput.value.trim();
    const pass = passwordInput.value;
    if (user === VALID_USERNAME && pass === VALID_PASSWORD) {
      sessionStorage.setItem('auth_user', user);
      sessionStorage.setItem('auth_time', Date.now().toString());
      document.body.classList.add('app-loaded');
      initApp();
    } else {
      showError();
      passwordInput.value = '';
      passwordInput.focus();
    }
  }
  
  loginBtn.addEventListener('click', attemptLogin);
  usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') passwordInput.focus(); });
  passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptLogin(); });
  
  const authUser = sessionStorage.getItem('auth_user');
  const authTime = sessionStorage.getItem('auth_time');
  if (authUser && authTime && (Date.now() - parseInt(authTime) < 28800000)) {
    document.body.classList.add('app-loaded');
    initApp();
  }
  usernameInput.focus();
}

// ============= AGENTS =============
const AGENTS = [
  { id: "dispatch", name: "NEXUS", role: "Dispatcher", team: "core", icon: "🧬", color: "#00ff88", keywords: ["ajuda", "situação", "o que fazer", "começar"], prompt: "Você é NEXUS, o dispatcher. Analise a situação e chame o agente especialista correto. Responda em português com JSON: {\"agents\": [\"agent_id\"], \"conversation\": [{\"agent\": \"agent_id\", \"message\": \"resposta\"}]}" },
  { id: "commander", name: "Rex", role: "Commander", team: "red", icon: "⚔️", color: "#ff4444", keywords: ["estratégia", "metodologia", "plano", "coordenação", "ptes", "owasp"], prompt: "Você é Rex, especialista em estratégia ofensiva. Responda em português com comandos práticos." },
  { id: "ghost", name: "Ghost", role: "OSINT", team: "red", icon: "👁️", color: "#ff6600", keywords: ["osint", "reconhecimento", "shodan", "theharvester", "maltego", "google dorks", "subfinder", "amass", "informação"], prompt: "Você é Ghost, especialista em OSINT e reconhecimento. Responda em português com comandos e ferramentas." },
  { id: "phantom", name: "Phantom", role: "Web", team: "red", icon: "🕸️", color: "#ff8800", keywords: ["sql", "xss", "lfi", "rfi", "burp", "web", "injection", "upload"], prompt: "Você é Phantom, especialista em exploração web. Responda em português com técnicas e comandos." },
  { id: "shadow", name: "Shadow", role: "Network", team: "red", icon: "🌐", color: "#ff5500", keywords: ["nmap", "rede", "porta", "serviço", "pivoting", "enumeração", "scan"], prompt: "Você é Shadow, especialista em rede e enumeração. Responda em português." },
  { id: "viper", name: "Viper", role: "Exploit", team: "red", icon: "🐍", color: "#dd2200", keywords: ["exploit", "cve", "searchsploit", "metasploit", "vulnerabilidade"], prompt: "Você é Viper, especialista em exploits. Responda em português." },
  { id: "cipher", name: "Cipher", role: "Password", team: "red", icon: "🔐", color: "#cc3300", keywords: ["hash", "hydra", "hashcat", "john", "senha", "cracking", "wordlist"], prompt: "Você é Cipher, especialista em ataques de senha. Responda em português." },
  { id: "wraith", name: "Wraith", role: "Post-Exp", team: "red", icon: "💀", color: "#ff1100", keywords: ["shell", "meterpreter", "persistência", "pós-exploração", "lateral"], prompt: "Você é Wraith, especialista em pós-exploração. Responda em português." },
  { id: "dominator", name: "Dominator", role: "AD", team: "red", icon: "🏛️", color: "#ee3300", keywords: ["active directory", "ad", "kerberoasting", "bloodhound", "dcsync", "domain"], prompt: "Você é Dominator, especialista em Active Directory. Responda em português." },
  { id: "privesc", name: "Escalon", role: "Privesc", team: "specialist", icon: "🔑", color: "#ffcc00", keywords: ["privesc", "privilegio", "escalar", "sudo", "suid", "linpeas", "winpeas"], prompt: "Você é Escalon, especialista em escalação de privilégio. Responda em português." },
  { id: "syntax", name: "Syntax", role: "Scripts", team: "specialist", icon: "💻", color: "#aa44ff", keywords: ["python", "script", "bash", "powershell", "automação", "código"], prompt: "Você é Syntax, especialista em scripting. Responda em português com código." },
  { id: "scribe", name: "Scribe", role: "Reports", team: "specialist", icon: "📝", color: "#88aaff", keywords: ["relatório", "documentar", "anotar", "writeup", "report", "notas"], prompt: "Você é Scribe, especialista em relatórios. Responda em português com estrutura profissional." },
  { id: "gitops", name: "GitOps", role: "GitHub", team: "core", icon: "🐙", color: "#8844ee", keywords: ["github", "git", "repositório", "commit", "push", "markdown"], prompt: "Você é GitOps, especialista em GitHub. Responda em português com comandos git e markdown." },
];

const AGENT_MAP = AGENTS.reduce((acc, a) => { acc[a.id] = a; return acc; }, {});
const TEAM_ORDER = ["core", "red", "specialist"];
const TEAM_LABELS = { core: "◆ CORE", red: "◆ RED TEAM", specialist: "◆ SPECIALISTS" };
const TEAM_COLORS = { core: "#00ff88", red: "#ff4444", specialist: "#ffaa00" };

const QUICK_PROMPTS = [
  "Quebrei um hash, como escalar privilégio?",
  "Preciso de um script Python para automatizar",
  "Como documentar tudo que fiz?",
  "Quero salvar no GitHub meu writeup"
];

// ============= SISTEMA DE DETECÇÃO DE AGENTE =============
function detectAgent(userMessage) {
  const lowerMsg = userMessage.toLowerCase();
  
  // Verifica palavras-chave em todos os agentes
  for (const agent of AGENTS) {
    if (agent.keywords && agent.keywords.some(kw => lowerMsg.includes(kw))) {
      console.log(`🔍 Detectado: ${agent.name} (${agent.role})`);
      return agent.id;
    }
  }
  return "dispatch"; // Fallback para NEXUS
}

// ============= API GROQ =============
async function callAPI(messages, agentId) {
  const agent = AGENT_MAP[agentId] || AGENT_MAP["dispatch"];
  const systemPrompt = agent.prompt;
  
  const res = await fetch("/api/groq", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: messages,
      system: systemPrompt
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.content?.[0]?.text || "";
}

function renderMD(text) {
  if (!text) return '';
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) => '<pre>' + c + '</pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<b style="color:#00ff88">$1</b>');
  t = t.replace(/^#{1,3} (.+)$/gm, '<div class="md-h">$1</div>');
  t = t.replace(/^- (.+)$/gm, '<div class="md-li">▸ $1</div>');
  t = t.replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>');
  return t;
}

function App() {
  // Carregar histórico salvo
  const savedMessages = localStorage.getItem('pentest_forge_messages');
  const initialMessages = savedMessages ? JSON.parse(savedMessages) : [{ type: "system", content: "NEXUS online. Escolha um agente na sidebar ou descreva sua situação." }];
  
  const [messages, setMessages] = useState(initialMessages);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [selectedAgent, setSelectedAgent] = useState(AGENT_MAP["dispatch"]);
  const [sidebarTab, setSidebarTab] = useState("agents");
  const [search, setSearch] = useState("");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  // Salvar mensagens no localStorage
  useEffect(() => {
    localStorage.setItem('pentest_forge_messages', JSON.stringify(messages));
  }, [messages]);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  // Limpar conversa
  function clearChat() {
    setMessages([{ type: "system", content: "Conversa reiniciada. Escolha um agente ou descreva sua situação." }]);
    localStorage.removeItem('pentest_forge_messages');
  }

  async function sendMessage() {
    if (!input.trim() || loading) return;
    const userText = input.trim();
    setInput("");
    setMessages(prev => [...prev, { type: "user", content: userText }]);
    setLoading(true);

    try {
      // Detectar agente baseado na mensagem (modo automático)
      let targetAgentId = selectedAgent.id;
      if (selectedAgent.id === "dispatch") {
        targetAgentId = detectAgent(userText);
      }
      
      const targetAgent = AGENT_MAP[targetAgentId];
      setSelectedAgent(targetAgent);
      
      // Preparar histórico (últimas 10 mensagens para contexto)
      const history = messages
        .filter(m => m.type === "user" || m.type === "agent")
        .slice(-10)
        .map(m => ({ role: m.type === "user" ? "user" : "assistant", content: m.content }));
      
      history.push({ role: "user", content: userText });
      
      const raw = await callAPI(history, targetAgentId);
      
      setMessages(prev => [...prev, { type: "agent", agentId: targetAgentId, content: raw }]);
    } catch (err) {
      setMessages(prev => [...prev, { type: "agent", agentId: "dispatch", content: `Erro: ${err.message}` }]);
    }
    setLoading(false);
    inputRef.current?.focus();
  }

  function selectAgent(agent) {
    setSelectedAgent(agent);
    setSidebarOpen(false);
    // Adiciona mensagem de sistema informando a troca
    setMessages(prev => [...prev, { type: "system", content: `🎯 Modo manual: Agora conversando com ${agent.name} (${agent.role}).` }]);
  }

  const filteredAgents = AGENTS.filter(a => !search || [a.name, a.role].some(s => s.toLowerCase().includes(search.toLowerCase())));

  return h(Fragment, null,
    // Botão menu mobile
    h('div', { className: 'menu-toggle', onClick: () => setSidebarOpen(!sidebarOpen) }, '☰'),
    
    h('div', { style: { height: '100vh', display: 'flex', flexDirection: 'column', background: '#050508', overflow: 'hidden' } },
      // HEADER
      h('div', { style: { background: '#0a0a14', borderBottom: '1px solid #0a2a0a', padding: '0 16px', height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 10 } },
          h('div', { style: { width: 32, height: 32, borderRadius: 8, background: 'linear-gradient(135deg,#00ff88,#0088ff)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 } }, '⚡'),
          h('div', null,
            h('div', { style: { fontSize: 14, fontWeight: 900, color: '#00ff88', fontFamily: "'Orbitron',monospace" } }, 'PENTEST FORGE'),
            h('div', { style: { fontSize: 8, color: '#334433' } }, `${AGENTS.length} AGENTES • ${selectedAgent.name}`)
          )
        ),
        h('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
          h('button', { onClick: clearChat, className: 'clear-chat-btn', style: { background: '#330000', border: '1px solid #ff4444', borderRadius: 6, padding: '4px 8px', fontSize: 9, color: '#ff8888', cursor: 'pointer' } }, '🗑️ Limpar'),
          h('div', { style: { fontSize: 9, color: '#00ff88' } }, '🟢 LIVE')
        )
      ),
      
      // SIDEBAR + CHAT
      h('div', { style: { display: 'flex', flex: 1, overflow: 'hidden', position: 'relative' } },
        // SIDEBAR
        h('div', { className: `sidebar ${sidebarOpen ? 'open' : ''}`, style: { width: 240, background: '#030306', borderRight: '1px solid #0a1a0a', display: 'flex', flexDirection: 'column', flexShrink: 0, overflowY: 'auto', position: 'relative', zIndex: 99 } },
          h('div', { style: { padding: '8px' } },
            h('input', { value: search, onChange: e => setSearch(e.target.value), placeholder: '🔍 buscar agente...', style: { width: '100%', background: '#0a0a0f', border: '1px solid #0a2a0a', borderRadius: 4, padding: '6px', color: '#668866', fontSize: 10, fontFamily: 'inherit', outline: 'none' } })
          ),
          h('div', { style: { flex: 1, overflowY: 'auto' } },
            ...TEAM_ORDER.map(team => {
              const agents = filteredAgents.filter(a => a.team === team);
              if (!agents.length) return null;
              return h('div', { key: team },
                h('div', { style: { padding: '8px 10px 4px', fontSize: 8, color: TEAM_COLORS[team] } }, TEAM_LABELS[team]),
                ...agents.map(agent => {
                  const isActive = selectedAgent.id === agent.id;
                  return h('div', { key: agent.id, onClick: () => selectAgent(agent), style: { display: 'flex', alignItems: 'center', gap: 7, padding: '8px 10px', background: isActive ? agent.color + '15' : 'transparent', borderLeft: isActive ? `2px solid ${agent.color}` : '2px solid transparent', cursor: 'pointer' } },
                    h('div', { style: { width: 22, height: 22, borderRadius: 4, background: agent.color + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11 } }, agent.icon),
                    h('div', { style: { flex: 1 } },
                      h('div', { style: { fontSize: 11, color: isActive ? agent.color : '#667766', fontWeight: 'bold' } }, agent.name),
                      h('div', { style: { fontSize: 8, color: '#334433' } }, agent.role)
                    )
                  );
                })
              );
            })
          )
        ),
        
        // CHAT AREA
        h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', width: '100%' } },
          h('div', { style: { flex: 1, overflowY: 'auto', padding: '12px' } },
            ...messages.map((msg, idx) => {
              if (msg.type === 'system') {
                return h('div', { key: idx, style: { textAlign: 'center', marginBottom: 12 } }, 
                  h('span', { style: { fontSize: 9, color: '#334433', background: '#0a1a0a', padding: '3px 10px', borderRadius: 20 } }, `🧬 ${msg.content}`)
                );
              }
              if (msg.type === 'user') {
                return h('div', { key: idx, style: { display: 'flex', justifyContent: 'flex-end', marginBottom: 12 } }, 
                  h('div', { style: { maxWidth: '80%', background: '#0a1a0a', border: '1px solid #1a3a1a', borderRadius: 12, padding: '8px 12px', fontSize: 11, color: '#aaccaa', wordBreak: 'break-word' } }, msg.content)
                );
              }
              if (msg.type === 'agent') {
                const agent = AGENT_MAP[msg.agentId] || AGENT_MAP['dispatch'];
                return h('div', { key: idx, style: { display: 'flex', gap: 8, marginBottom: 12 } },
                  h('div', { style: { width: 32, height: 32, borderRadius: 8, background: agent.color + '20', border: `1px solid ${agent.color}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, flexShrink: 0 } }, agent.icon),
                  h('div', { style: { flex: 1, background: '#08080e', border: `1px solid ${agent.color}25`, borderRadius: 12, padding: '10px' } },
                    h('div', { style: { fontSize: 9, color: agent.color, fontWeight: 'bold', marginBottom: 4 } }, `${agent.name} • ${agent.role}`),
                    h('div', { dangerouslySetInnerHTML: { __html: renderMD(msg.content) }, style: { fontSize: 11, color: '#b0c0b0', lineHeight: 1.5, wordBreak: 'break-word' } })
                  )
                );
              }
              return null;
            }),
            
            messages.length === 1 && h('div', { style: { display: 'grid', gridTemplateColumns: '1fr', gap: 8, maxWidth: 400, margin: '20px auto' } },
              ...QUICK_PROMPTS.map(p => 
                h('button', { key: p, className: 'quick-btn', onClick: () => { setInput(p); inputRef.current?.focus(); }, style: { background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 8, padding: '10px', cursor: 'pointer', textAlign: 'left', fontSize: 10, color: '#556677', fontFamily: 'inherit' } }, p)
              )
            ),
            
            loading && h('div', { style: { display: 'flex', gap: 8, alignItems: 'center', marginTop: 8 } },
              h('div', { style: { width: 32, height: 32, borderRadius: 8, background: '#00ff8815', border: '1px solid #00ff8840', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 } }, '🧬'),
              h('div', { style: { background: '#08080e', border: '1px solid #00ff8820', borderRadius: 12, padding: '8px 12px' } },
                h('div', { style: { fontSize: 9, color: '#00ff88' } }, 'Processando...')
              )
            ),
            h('div', { ref: bottomRef })
          ),
          
          // INPUT
          h('div', { style: { padding: '10px 12px', borderTop: '1px solid #0a2a0a', background: '#050508' } },
            h('div', { style: { display: 'flex', gap: 8 } },
              h('div', { className: 'agent-selector', onClick: () => setSidebarOpen(true), style: { display: 'flex', alignItems: 'center', gap: 6, background: selectedAgent.color + '15', padding: '0 10px', borderRadius: 20, cursor: 'pointer' } },
                h('span', null, selectedAgent.icon),
                h('span', { style: { fontSize: 9, color: selectedAgent.color } }, selectedAgent.name)
              ),
              h('input', { ref: inputRef, value: input, onChange: e => setInput(e.target.value), onKeyDown: e => e.key === 'Enter' && sendMessage(), placeholder: 'Digite sua mensagem...', style: { flex: 1, background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 20, padding: '10px 14px', color: '#aaccaa', fontSize: 11, fontFamily: 'inherit', outline: 'none' } }),
              h('button', { onClick: sendMessage, disabled: loading, style: { padding: '8px 18px', borderRadius: 20, border: '1px solid #00ff8840', background: loading ? '#08080e' : '#001a00', color: loading ? '#334433' : '#00ff88', cursor: loading ? 'not-allowed' : 'pointer', fontSize: 10, fontWeight: 'bold' } }, '➤')
            )
          )
        )
      )
    )
  );
}

function initApp() {
  createRoot(document.getElementById('root')).render(h(App));
}

initLogin();
</script>
</body>
</html>
