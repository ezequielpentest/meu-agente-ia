<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pentest Forge</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4ef;color:#1a1915;height:100vh;overflow:hidden}
:root{
  --bg:#f5f4ef;
  --bg-sidebar:#eeece5;
  --bg-card:#fff;
  --border:#e0ddd4;
  --text:#1a1915;
  --text-muted:#6b6860;
  --text-hint:#9e9b94;
  --font-mono:'Share Tech Mono',monospace;
}
.dark-mode{
  --bg:#1a1917;
  --bg-sidebar:#141412;
  --bg-card:#242320;
  --border:#2e2d29;
  --text:#f0ede6;
  --text-muted:#a09d96;
  --text-hint:#605d58;
}
.app{display:flex;height:100vh;background:var(--bg)}
.sidebar{width:300px;min-width:300px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:transform .25s;flex-shrink:0}
.sidebar-header{padding:16px 12px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{font-size:13px;font-weight:600;color:var(--text);flex:1}
.new-chat-btn{width:calc(100% - 24px);margin:12px;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;color:var(--text-muted);font-size:13px;font-family:inherit}
.new-chat-btn:hover{background:var(--border)}
.sidebar-section{padding:8px 12px;flex-shrink:0}
.sidebar-section-label{font-size:10px;font-weight:600;color:var(--text-hint);padding:0 0 6px;letter-spacing:.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.toggle-history-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-hint);padding:0 4px}
.toggle-history-btn:hover{color:var(--text)}
.agents-container{max-height:300px;overflow-y:auto}
.agent-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background .15s;font-family:inherit}
.agent-item:hover{background:rgba(0,0,0,.05)}
.dark-mode .agent-item:hover{background:rgba(255,255,255,.05)}
.agent-item.active{background:var(--bg-card);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.agent-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.agent-item-info{flex:1;min-width:0}
.agent-item-name{font-size:13px;font-weight:500;color:var(--text)}
.agent-item-role{font-size:10px;color:var(--text-hint)}
.history-section{flex:1;overflow-y:auto;padding:0 12px 12px;min-height:100px}
.history-item{padding:8px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px}
.history-item:hover{background:rgba(0,0,0,.05)}
.history-item.active{background:var(--bg-card)}
.history-date{font-size:10px;color:var(--text-hint)}
.history-preview{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;background:var(--bg)}
.topbar-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.topbar-agent{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;background:var(--bg-sidebar);border:1px solid var(--border);font-size:12px;color:var(--text-muted)}
.icon-btn{width:34px;height:34px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px}
.icon-btn:hover{background:var(--border)}
.messages{flex:1;overflow-y:auto;padding:20px 0}
.messages-inner{max-width:800px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:16px}
.welcome{text-align:center;padding:40px 0 20px}
.welcome-icon{font-size:40px}
.welcome-title{font-size:20px;font-weight:500;color:var(--text);margin:12px 0 6px}
.welcome-sub{font-size:13px;color:var(--text-muted)}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px}
.quick-card{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;text-align:left;font-size:12px;color:var(--text-muted);font-family:inherit}
.quick-card:hover{border-color:var(--text-hint)}
.msg-user{display:flex;justify-content:flex-end}
.msg-user-bubble{max-width:80%;background:var(--text);color:var(--bg);border-radius:18px 18px 4px 18px;padding:10px 16px;font-size:14px}
.msg-agent{display:flex;gap:12px;align-items:flex-start}
.msg-agent-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg-agent-body{flex:1}
.msg-agent-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.msg-agent-name{font-size:12px;font-weight:600}
.msg-agent-role{font-size:10px;color:var(--text-hint)}
.copy-btn{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:10px;cursor:pointer;color:var(--text-muted);margin-left:auto}
.copy-btn:hover{background:var(--border)}
.msg-agent-text{font-size:14px;line-height:1.6;color:var(--text)}
.msg-agent-text pre{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;font-size:12px;font-family:var(--font-mono);margin:8px 0;white-space:pre-wrap}
.msg-agent-text code{background:var(--bg-sidebar);padding:2px 6px;border-radius:4px;font-size:12px;font-family:var(--font-mono)}
.dispatch-row{display:flex;align-items:center;gap:8px;margin:4px 0 8px 46px;flex-wrap:wrap}
.dispatch-badge{font-size:10px;padding:2px 10px;border-radius:20px;font-weight:500}
.typing{display:flex;gap:4px;padding:4px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-hint);animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.system-msg{text-align:center}
.system-badge{font-size:11px;color:var(--text-hint);background:var(--bg-sidebar);padding:3px 12px;border-radius:20px;border:1px solid var(--border)}
.input-area{padding:12px 20px 16px;border-top:1px solid var(--border)}
.input-wrap{max-width:800px;margin:0 auto;position:relative}
.input-box{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:12px 50px 12px 16px;font-size:14px;font-family:inherit;color:var(--text);outline:none;resize:none;min-height:48px;max-height:140px}
.input-box:focus{border-color:var(--text-hint)}
.send-btn{position:absolute;right:10px;bottom:10px;width:34px;height:34px;border-radius:10px;border:none;background:var(--text);color:var(--bg);cursor:pointer}
.send-btn:disabled{opacity:.3}
.input-hint{text-align:center;font-size:10px;color:var(--text-hint);margin-top:6px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:150}
.mob-toggle{display:none;position:fixed;bottom:20px;left:16px;z-index:200;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;align-items:center;justify-content:center;font-size:20px}
@media(max-width:680px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:160;transform:translateX(-100%);width:300px}
  .sidebar.open{transform:translateX(0)}
  .mob-toggle{display:flex}
  .overlay.show{display:block}
  .quick-grid{grid-template-columns:1fr}
}
.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:340px}
.login-logo{font-size:32px;text-align:center}
.login-title{font-size:18px;font-weight:600;text-align:center;color:var(--text);margin:8px 0 4px}
.login-sub{font-size:12px;color:var(--text-hint);text-align:center;margin-bottom:24px}
.login-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block}
.login-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;background:var(--bg);color:var(--text);outline:none;margin-bottom:14px}
.login-input:focus{border-color:var(--text-hint)}
.login-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:500;cursor:pointer}
.login-err{font-size:12px;color:#a32d2d;text-align:center;margin-top:12px;display:none}
.login-err.show{display:block}
.switch-form{text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)}
.switch-link{color:var(--text);cursor:pointer;text-decoration:underline}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div id="loginForm">
      <div class="login-logo">⚡</div>
      <div class="login-title">Pentest Forge</div>
      <div class="login-sub">Entre com sua conta</div>
      <label class="login-label">E-mail</label>
      <input class="login-input" id="loginEmail" type="email" placeholder="seu@email.com"/>
      <label class="login-label">Senha</label>
      <input class="login-input" id="loginPassword" type="password" placeholder="••••••••"/>
      <button class="login-btn" id="loginBtn">Entrar</button>
      <div class="login-err" id="loginErr">Credenciais inválidas</div>
      <div class="switch-form">Não tem conta? <span class="switch-link" id="showRegister">Criar conta</span></div>
    </div>
    <div id="registerForm" style="display:none">
      <div class="login-logo">⚡</div>
      <div class="login-title">Criar Conta</div>
      <div class="login-sub">Cadastre-se</div>
      <label class="login-label">Nome</label>
      <input class="login-input" id="regName" type="text" placeholder="Seu nome"/>
      <label class="login-label">E-mail</label>
      <input class="login-input" id="regEmail" type="email" placeholder="seu@email.com"/>
      <label class="login-label">Senha</label>
      <input class="login-input" id="regPassword" type="password" placeholder="••••••••"/>
      <button class="login-btn" id="registerBtn">Cadastrar</button>
      <div class="login-err" id="registerErr">Erro</div>
      <div class="switch-form">Já tem conta? <span class="switch-link" id="showLogin">Fazer login</span></div>
    </div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-size:18px">⚡</span>
      <span class="sidebar-logo">Pentest Forge</span>
      <button class="icon-btn" id="darkModeBtn">🌙</button>
    </div>
    <button class="new-chat-btn" id="newChatBtn">✏️ Novo chat</button>
    
    <div class="sidebar-section">
      <div class="sidebar-section-label">
        Agentes IA
        <button class="toggle-history-btn" id="toggleAgentsBtn" title="Esconder/Mostrar agentes">−</button>
      </div>
      <div id="agentsContainer" class="agents-container" style="max-height:300px;overflow-y:auto"></div>
    </div>
    
    <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="sidebar-section-label">
        Histórico
        <button class="toggle-history-btn" id="toggleHistoryBtn" title="Esconder/Mostrar histórico">−</button>
      </div>
      <div id="historyContainer" class="history-section" style="flex:1;overflow-y:auto;min-height:80px"></div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">NEXUS — Chat Geral</span>
      <div class="topbar-agent" id="topbarAgent">🧬 NEXUS</div>
      <button class="icon-btn" id="clearChatBtn" title="Limpar conversa">🗑️</button>
      <button class="icon-btn" id="logoutBtn" title="Sair">Sair</button>
    </div>
    <div class="messages" id="messagesDiv">
      <div class="messages-inner" id="messagesInner"></div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea class="input-box" id="inputBox" rows="1" placeholder="Descreva sua situação..."></textarea>
        <button class="send-btn" id="sendBtn" disabled>➤</button>
      </div>
      <div class="input-hint">Enter enviar · Shift+Enter nova linha</div>
    </div>
  </div>
</div>

<button class="mob-toggle" id="mobToggle">☰</button>

<script>
// ============= TODOS OS AGENTES =============
const AGENTS = [
  { id:"dispatch", name:"NEXUS", role:"Dispatcher", team:"core", icon:"🧬", color:"#00ff88", bg:"#eaf3de", specialty:"Analisa situações e despacha o agente especialista correto" },
  { id:"gitops", name:"GitOps", role:"GitHub", team:"core", icon:"🐙", color:"#8844ee", bg:"#eeedfe", specialty:"Gerencia writeups, markdown e repositórios GitHub" },
  { id:"commander", name:"Rex", role:"Commander", team:"red", icon:"⚔️", color:"#ff4444", bg:"#fcebeb", specialty:"Estratégia ofensiva, metodologias PTES/OWASP" },
  { id:"ghost", name:"Ghost", role:"OSINT", team:"red", icon:"👁️", color:"#ff6600", bg:"#faeeda", specialty:"OSINT, Shodan, theHarvester, Maltego" },
  { id:"phantom", name:"Phantom", role:"Web", team:"red", icon:"🕸️", color:"#ff8800", bg:"#faeeda", specialty:"SQLi, XSS, LFI, Burp Suite" },
  { id:"shadow", name:"Shadow", role:"Network", team:"red", icon:"🌐", color:"#ff5500", bg:"#faeeda", specialty:"Nmap, enumeração de serviços, pivoting" },
  { id:"viper", name:"Viper", role:"Exploits", team:"red", icon:"🐍", color:"#dd2200", bg:"#fcebeb", specialty:"CVEs, Searchsploit, adaptação de exploits" },
  { id:"cipher", name:"Cipher", role:"Cracking", team:"red", icon:"🔐", color:"#cc3300", bg:"#fcebeb", specialty:"Hashcat, John, Hydra, cracking" },
  { id:"wraith", name:"Wraith", role:"Post-Exp", team:"red", icon:"💀", color:"#ff1100", bg:"#fcebeb", specialty:"Meterpreter, shells, persistência" },
  { id:"dominator", name:"Dominator", role:"AD", team:"red", icon:"🏛️", color:"#ee3300", bg:"#fbeaf0", specialty:"Active Directory, BloodHound" },
  { id:"echo", name:"Echo", role:"SocialEng", team:"red", icon:"🎭", color:"#ff3300", bg:"#fcebeb", specialty:"Phishing, SET framework" },
  { id:"bof", name:"B0F", role:"Buffer Overflow", team:"spec", icon:"🧠", color:"#ff44aa", bg:"#fcebeb", specialty:"Buffer Overflow, shellcode" },
  { id:"privesc", name:"Escalon", role:"Privesc", team:"spec", icon:"🔑", color:"#ffcc00", bg:"#faeeda", specialty:"Escalação Linux/Windows" },
  { id:"tux", name:"Tux", role:"Linux", team:"spec", icon:"🐧", color:"#00cc44", bg:"#eaf3de", specialty:"Linux avançado, bash" },
  { id:"hydra_m", name:"Hydra", role:"Metasploit", team:"spec", icon:"💣", color:"#ff8800", bg:"#faeeda", specialty:"Metasploit Framework" },
  { id:"syntax", name:"Syntax", role:"Scripting", team:"spec", icon:"💻", color:"#aa44ff", bg:"#eeedfe", specialty:"Python, Bash, automação" },
  { id:"airwave", name:"Airwave", role:"Wireless", team:"spec", icon:"📡", color:"#00ffcc", bg:"#eaf3de", specialty:"Wi-Fi hacking" },
  { id:"scribe", name:"Scribe", role:"Reports", team:"spec", icon:"📝", color:"#88aaff", bg:"#e6f1fb", specialty:"Relatórios DCPT/OSCP" }
];

const AGENT_MAP = {};
AGENTS.forEach(a => AGENT_MAP[a.id] = a);

const QUICK = [
  "Preciso descriptografar um arquivo .enc, escalar privilégio no Linux, criar um script Python e documentar no GitHub",
  "Como fazer Buffer Overflow no Windows?",
  "Enumera Active Directory com BloodHound",
  "Cria um script Python para scanner de portas"
];

// ============= SYSTEM PROMPTS =============
const SYSTEM = {
  dispatch: `Você é NEXUS, dispatcher. Sua ÚNICA função é DELEGAR. NUNCA responda diretamente.

Mapeamento: .enc,hash,john → cipher; escalar,root,privesc → privesc; python,script → syntax; github,writeup → gitops; buffer overflow → bof; active directory → dominator; nmap,porta,scan → shadow.

Responda SOMENTE JSON: {"agents":["cipher","privesc"],"conversation":[{"agent":"cipher","message":"comandos"},{"agent":"privesc","message":"comandos"}]}`,
  cipher: `Você é Cipher. Responda com comandos: file, xxd, zip2john, john, hashcat.`,
  privesc: `Você é Escalon. Responda com: sudo -l, find / -perm -4000, linpeas.sh.`,
  syntax: `Você é Syntax. Responda com código Python COMPLETO.`,
  gitops: `Você é GitOps. Responda com writeup MARKDOWN completo.`,
  shadow: `Você é Shadow. Responda com nmap: nmap -sV -sC -p- target.com`,
  bof: `Você é B0F. Responda com código Python para fuzzing.`,
  dominator: `Você é Dominator. Responda comandos BloodHound.`,
  ghost: `Você é Ghost. Responda comandos OSINT.`,
  scribe: `Você é Scribe. Responda relatório técnico.`,
  wraith: `Você é Wraith. Responda comandos de shell.`
};

let chatMode = "general";
let selectedAgentId = "dispatch";
let messages = [];
let sessions = JSON.parse(localStorage.getItem("pf_sessions") || "[]");
let agentChats = JSON.parse(localStorage.getItem("pf_agent_chats") || "{}");
let currentSessionId = Date.now().toString();
let loading = false;
let darkMode = localStorage.getItem("pf_dark") === "1";
let historyVisible = true;
let agentsVisible = true;

function escapeHtml(t) { return t?.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") || ''; }

function copyToClipboard(text) {
  navigator.clipboard.writeText(text);
  // Sem popup - cópia silenciosa
}

function renderMD(text){
  if(!text) return "";
  let t = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c)=>`<pre>${c}</pre>`);
  t = t.replace(/`([^`]+)`/g,"<code>$1</code>");
  t = t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  t = t.replace(/^#+\s*(.+)$/gm,"<div style='font-size:15px;font-weight:600;margin:10px 0 4px'>$1</div>");
  t = t.replace(/^[-*]\s+(.+)$/gm,"<div style='padding-left:14px;margin:3px 0'>▸ $1</div>");
  t = t.replace(/\n\n/g,"<br/><br/>").replace(/\n/g,"<br/>");
  return t;
}

async function callGroq(history, system){
  const res = await fetch("/api/groq",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ messages: history, system: system, model: "llama-3.3-70b-versatile", temperature: 0.3, max_tokens: 4000 })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data.content?.[0]?.text || "";
}

// Login
document.getElementById("showRegister").onclick = () => { document.getElementById("loginForm").style.display = "none"; document.getElementById("registerForm").style.display = "block"; };
document.getElementById("showLogin").onclick = () => { document.getElementById("registerForm").style.display = "none"; document.getElementById("loginForm").style.display = "block"; };
document.getElementById("loginBtn").onclick = () => { document.getElementById("loginWrap").style.display = "none"; document.getElementById("app").style.display = "flex"; boot(); };
document.getElementById("registerBtn").onclick = () => { alert("Conta criada!"); document.getElementById("registerForm").style.display = "none"; document.getElementById("loginForm").style.display = "block"; };
document.getElementById("logoutBtn").onclick = () => { sessionStorage.clear(); location.reload(); };

function boot() {
  if(darkMode) document.body.classList.add("dark-mode");
  buildSidebar();
  renderMessages();
  renderHistory();
  document.getElementById("inputBox").focus();
}

document.getElementById("darkModeBtn").onclick = () => {
  darkMode = !darkMode;
  document.body.classList.toggle("dark-mode", darkMode);
  localStorage.setItem("pf_dark", darkMode ? "1" : "0");
};

// Toggle histórico e agentes
document.getElementById("toggleHistoryBtn").onclick = () => {
  const container = document.getElementById("historyContainer");
  const btn = document.getElementById("toggleHistoryBtn");
  historyVisible = !historyVisible;
  container.style.display = historyVisible ? "block" : "none";
  btn.textContent = historyVisible ? "−" : "+";
};

document.getElementById("toggleAgentsBtn").onclick = () => {
  const container = document.getElementById("agentsContainer");
  const btn = document.getElementById("toggleAgentsBtn");
  agentsVisible = !agentsVisible;
  container.style.display = agentsVisible ? "block" : "none";
  btn.textContent = agentsVisible ? "−" : "+";
};

function buildSidebar() {
  const container = document.getElementById("agentsContainer");
  container.innerHTML = "";
  
  ["core","red","spec"].forEach(team => {
    const agents = AGENTS.filter(a => a.team === team);
    if(!agents.length) return;
    agents.forEach(agent => {
      const btn = document.createElement("button");
      btn.className = "agent-item";
      btn.id = "agent-btn-" + agent.id;
      btn.innerHTML = `<div class="agent-icon" style="background:${agent.bg}">${agent.icon}</div>
        <div class="agent-item-info">
          <div class="agent-item-name">${agent.name}</div>
          <div class="agent-item-role">${agent.role}</div>
        </div>`;
      btn.onclick = () => selectAgent(agent.id);
      container.appendChild(btn);
    });
  });
  updateSidebarActive();
}

function updateSidebarActive(){
  document.querySelectorAll(".agent-item").forEach(el => el.classList.remove("active"));
  const activeId = chatMode === "general" ? "dispatch" : selectedAgentId;
  const btn = document.getElementById("agent-btn-" + activeId);
  if(btn) btn.classList.add("active");
}

function selectAgent(id){
  const agent = AGENT_MAP[id];
  if(!agent) return;
  
  // Mostrar mensagem de especialidade do agente no chat
  const specialtyMsg = `🎯 **${agent.name}** (${agent.role})\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n💡 **Especialidade:** ${agent.specialty}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nAgora conversando diretamente com ${agent.name}. Descreva sua situação para receber ajuda especializada.`;
  
  if(id === "dispatch"){ 
    chatMode = "general"; 
    selectedAgentId = "dispatch"; 
  } else { 
    chatMode = "agent"; 
    selectedAgentId = id;
    // Adiciona mensagem de boas-vindas do agente no chat
    messages.push({ type: "system", content: specialtyMsg });
    renderMessages();
  }
  updateTopbar(); 
  updateSidebarActive(); 
  renderMessages(); 
  renderHistory(); 
  closeSidebar();
}

function updateTopbar(){
  const agent = AGENT_MAP[selectedAgentId] || AGENT_MAP["dispatch"];
  document.getElementById("topbarTitle").textContent = chatMode === "general" ? "NEXUS — Chat Geral" : `${agent.name} — Chat individual`;
  document.getElementById("topbarAgent").textContent = `${agent.icon} ${agent.name}`;
}

function renderHistory(){
  const el = document.getElementById("historyContainer");
  el.innerHTML = "";
  if(!sessions.length){
    el.innerHTML = '<div style="font-size:12px;color:var(--text-hint);padding:8px 10px">Nenhuma sessão</div>'; 
    return;
  }
  sessions.forEach(s => {
    const div = document.createElement("div");
    div.className = "history-item" + (s.id === currentSessionId && chatMode === "general" ? " active" : "");
    div.innerHTML = `<div class="history-date">${s.date}</div><div class="history-preview">${escapeHtml(s.preview)}</div>`;
    div.onclick = () => { 
      currentSessionId = s.id; 
      messages = s.messages; 
      chatMode = "general"; 
      selectedAgentId = "dispatch"; 
      updateTopbar(); 
      updateSidebarActive(); 
      renderMessages(); 
    };
    el.appendChild(div);
  });
  if(sessions.length > 0) el.style.display = historyVisible ? "block" : "none";
}

function renderMessages(){
  const inner = document.getElementById("messagesInner");
  inner.innerHTML = "";
  const currentMsgs = chatMode === "agent" ? (agentChats[selectedAgentId] || []) : messages;
  const agent = AGENT_MAP[selectedAgentId] || AGENT_MAP["dispatch"];
  
  if(!currentMsgs.length){
    const w = document.createElement("div"); w.className = "welcome";
    w.innerHTML = `<div class="welcome-icon">${chatMode === "agent" ? agent.icon : "🧬"}</div>
      <div class="welcome-title">${chatMode === "agent" ? agent.name : "Pentest Forge"}</div>
      <div class="welcome-sub">${chatMode === "agent" ? agent.role : "Descreva sua situação — múltiplos agentes especialistas serão ativados"}</div>
      ${chatMode === "general" ? '<div class="quick-grid" id="quickGrid"></div>' : ""}`;
    inner.appendChild(w);
    if(chatMode === "general"){
      const grid = document.getElementById("quickGrid");
      QUICK.forEach(q => {
        const btn = document.createElement("button"); btn.className = "quick-card"; btn.textContent = q;
        btn.onclick = () => { document.getElementById("inputBox").value = q; document.getElementById("sendBtn").disabled = false; document.getElementById("inputBox").focus(); };
        grid.appendChild(btn);
      });
    }
  } else { 
    currentMsgs.forEach((msg,i) => renderMsg(msg,i,inner)); 
  }
  
  if(loading){
    const row = document.createElement("div"); row.className = "msg-agent";
    row.innerHTML = `<div class="msg-agent-av" style="background:${agent.bg}">${agent.icon}</div>
      <div class="msg-agent-body"><div class="msg-agent-name" style="color:${agent.color}">${agent.name}</div>
      <div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    inner.appendChild(row);
  }
  document.getElementById("messagesDiv").scrollTop = 999999;
}

function renderMsg(msg, i, container){
  if(msg.type === "system"){
    const d = document.createElement("div"); d.className = "system-msg";
    d.innerHTML = `<span class="system-badge">${escapeHtml(msg.content)}</span>`; 
    container.appendChild(d); 
    return;
  }
  if(msg.type === "user"){
    const d = document.createElement("div"); d.className = "msg-user";
    d.innerHTML = `<div class="msg-user-bubble">${escapeHtml(msg.content)}</div>`; 
    container.appendChild(d); 
    return;
  }
  if(msg.type === "agent"){
    const a = AGENT_MAP[msg.agentId] || AGENT_MAP["dispatch"];
    const d = document.createElement("div"); d.className = "msg-agent";
    d.innerHTML = `<div class="msg-agent-av" style="background:${a.bg}">${a.icon}</div>
      <div class="msg-agent-body">
        <div class="msg-agent-header">
          <span class="msg-agent-name" style="color:${a.color}">${a.name}</span>
          <span class="msg-agent-role">${a.role}</span>
          <button class="copy-btn" onclick="copyToClipboard(\`${escapeHtml(msg.content).replace(/`/g, '\\`')}\`)">📋 Copiar</button>
        </div>
        <div class="msg-agent-text">${renderMD(msg.content)}</div>
      </div>`;
    container.appendChild(d); 
    return;
  }
  if(msg.type === "dispatch"){
    if(msg.agents && msg.agents.length){
      const row = document.createElement("div"); row.className = "dispatch-row";
      row.innerHTML = msg.agents.map(id => { 
        const a = AGENT_MAP[id]; 
        if(!a) return ""; 
        return `<span class="dispatch-badge" style="background:${a.bg};color:${a.color}">${a.icon} ${a.name}</span>`; 
      }).join("");
      container.appendChild(row);
    }
    if(msg.conversation && msg.conversation.length){
      msg.conversation.forEach(conv => {
        const a = AGENT_MAP[conv.agent] || AGENT_MAP["dispatch"];
        const d = document.createElement("div"); d.className = "msg-agent";
        d.innerHTML = `<div class="msg-agent-av" style="background:${a.bg}">${a.icon}</div>
          <div class="msg-agent-body">
            <div class="msg-agent-header">
              <span class="msg-agent-name" style="color:${a.color}">${a.name}</span>
              <span class="msg-agent-role">${a.role}</span>
              <button class="copy-btn" onclick="copyToClipboard(\`${escapeHtml(conv.message).replace(/`/g, '\\`')}\`)">📋 Copiar</button>
            </div>
            <div class="msg-agent-text">${renderMD(conv.message)}</div>
          </div>`;
        container.appendChild(d);
      });
    }
  }
}

async function sendMessage(){
  const input = document.getElementById("inputBox");
  const text = input.value.trim();
  if(!text || loading) return;
  input.value = ""; input.style.height = "auto";
  document.getElementById("sendBtn").disabled = true;
  loading = true;

  if(chatMode === "agent"){
    const prev = agentChats[selectedAgentId] || [];
    const updated = [...prev, {type:"user", content:text}];
    agentChats[selectedAgentId] = updated; renderMessages();
    const history = updated.map(m => ({role: m.type === "user" ? "user" : "assistant", content: m.content}));
    try {
      const reply = await callGroq(history, SYSTEM[selectedAgentId] || "Você é especialista. Responda em português com detalhes.");
      agentChats[selectedAgentId] = [...updated, {type:"agent", agentId:selectedAgentId, content:reply}];
      localStorage.setItem("pf_agent_chats", JSON.stringify(agentChats));
    } catch(e){
      agentChats[selectedAgentId] = [...updated, {type:"agent", agentId:"dispatch", content:"❌ Erro API Groq"}];
    }
    loading = false; renderMessages(); renderHistory(); return;
  }

  messages.push({type:"user", content:text}); renderMessages();
  
  const history = messages.filter(m => m.type === "user" || m.type === "dispatch").slice(-8).map(m => 
    m.type === "user" ? {role:"user", content:m.content} : {role:"assistant", content: m.raw ? m.raw.substring(0, 500) : "..."}
  );

  try {
    const raw = await callGroq(history, SYSTEM.dispatch);
    let parsed;
    let agentsList = [];
    let conversationList = [];
    
    try {
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if(jsonMatch) {
        parsed = JSON.parse(jsonMatch[0]);
        agentsList = parsed.agents || [];
        conversationList = parsed.conversation || [];
      } else {
        throw new Error("No JSON found");
      }
    } catch(e) {
      agentsList = ["dispatch"];
      conversationList = [{agent:"dispatch", message: raw.substring(0, 1000)}];
    }
    
    const validConversation = conversationList.map(conv => ({
      agent: conv.agent || "dispatch",
      message: conv.message || "Sem resposta detalhada"
    }));
    
    const dispatchMsg = { type:"dispatch", agents: agentsList, conversation: validConversation, raw: raw.substring(0, 2000) };
    messages.push(dispatchMsg);
    
    const sessionData = { id:currentSessionId, date:new Date().toLocaleDateString("pt-BR"), preview:text.slice(0,55), messages:[...messages] };
    sessions = [sessionData, ...sessions.filter(s => s.id !== currentSessionId)].slice(0,30);
    localStorage.setItem("pf_sessions", JSON.stringify(sessions));
    
  } catch(e){
    messages.push({ type:"dispatch", agents:["dispatch"], conversation:[{agent:"dispatch", message:"❌ Erro de conexão. Verifique sua chave API Groq."}], raw:"" });
  }
  loading = false; renderMessages(); renderHistory();
}

function newChat(){ currentSessionId = Date.now().toString(); messages = []; chatMode = "general"; selectedAgentId = "dispatch"; updateTopbar(); updateSidebarActive(); renderMessages(); }
function clearChat(){
  if(!confirm("Limpar conversa?")) return;
  if(chatMode === "agent"){ agentChats[selectedAgentId] = []; localStorage.setItem("pf_agent_chats", JSON.stringify(agentChats)); }
  else { messages = []; sessions = sessions.filter(s => s.id !== currentSessionId); localStorage.setItem("pf_sessions", JSON.stringify(sessions)); }
  renderMessages(); renderHistory();
}

document.getElementById("newChatBtn").onclick = newChat;
document.getElementById("clearChatBtn").onclick = clearChat;

const inputBox = document.getElementById("inputBox");
const sendBtn = document.getElementById("sendBtn");
inputBox.addEventListener("input", function(){ sendBtn.disabled = !this.value.trim(); this.style.height = "auto"; this.style.height = Math.min(this.scrollHeight, 120) + "px"; });
inputBox.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
sendBtn.onclick = sendMessage;

function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
function closeSidebar(){ document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
document.getElementById("mobToggle").onclick = toggleSidebar;
document.getElementById("overlay").onclick = closeSidebar;

window.copyToClipboard = copyToClipboard;
</script>
</body>
