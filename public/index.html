<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pentest Forge</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4ef;color:#1a1915;height:100vh;overflow:hidden}
:root{
  --bg:#f5f4ef;
  --bg-sidebar:#eeece5;
  --bg-card:#fff;
  --border:#e0ddd4;
  --text:#1a1915;
  --text-muted:#6b6860;
  --text-hint:#9e9b94;
  --font-mono:'Share Tech Mono',monospace;
}
.dark-mode{
  --bg:#1a1917;
  --bg-sidebar:#141412;
  --bg-card:#242320;
  --border:#2e2d29;
  --text:#f0ede6;
  --text-muted:#a09d96;
  --text-hint:#605d58;
}
.app{display:flex;height:100vh;background:var(--bg)}
.sidebar{width:260px;min-width:260px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:transform .25s}
.sidebar-header{padding:16px 12px 8px;display:flex;align-items:center;gap:8px}
.sidebar-logo{font-size:13px;font-weight:600;color:var(--text);flex:1}
.new-chat-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);font-size:13px;text-align:left;transition:background .15s;font-family:inherit}
.new-chat-btn:hover{background:var(--border)}
.sidebar-section{padding:4px 8px 0}
.sidebar-section-label{font-size:10px;font-weight:500;color:var(--text-hint);padding:8px 10px 3px;letter-spacing:.3px;text-transform:uppercase}
.agent-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background .15s;font-family:inherit}
.agent-item:hover{background:rgba(0,0,0,.05)}
.dark-mode .agent-item:hover{background:rgba(255,255,255,.05)}
.agent-item.active{background:var(--bg-card);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.dark-mode .agent-item.active{background:rgba(255,255,255,.07)}
.agent-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.agent-item-info{flex:1;min-width:0}
.agent-item-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-item-role{font-size:11px;color:var(--text-hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-dot{width:6px;height:6px;border-radius:50%;background:#639922;flex-shrink:0}
.history-section{flex:1;overflow-y:auto;padding:0 8px 8px}
.history-item{padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.history-item:hover{background:rgba(0,0,0,.05)}
.dark-mode .history-item:hover{background:rgba(255,255,255,.05)}
.history-item.active{background:var(--bg-card)}
.history-date{font-size:10px;color:var(--text-hint);margin-bottom:1px}
.history-preview{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;background:var(--bg)}
.topbar-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.topbar-agent{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;background:var(--bg-sidebar);border:1px solid var(--border);font-size:12px;color:var(--text-muted)}
.icon-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background .15s;font-size:16px}
.icon-btn:hover{background:var(--border)}
.messages{flex:1;overflow-y:auto;padding:24px 0}
.messages-inner{max-width:720px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:16px}
.welcome{text-align:center;padding:48px 0 24px}
.welcome-icon{font-size:36px;margin-bottom:12px}
.welcome-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:6px}
.welcome-sub{font-size:14px;color:var(--text-muted);max-width:440px;margin:0 auto}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px}
.quick-card{padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;text-align:left;font-size:13px;color:var(--text-muted);font-family:inherit;transition:border-color .15s;line-height:1.5}
.quick-card:hover{border-color:var(--text-hint)}
.msg-user{display:flex;justify-content:flex-end}
.msg-user-bubble{max-width:80%;background:var(--text);color:var(--bg);border-radius:18px 18px 4px 18px;padding:11px 16px;font-size:14px;line-height:1.6}
.msg-agent{display:flex;gap:12px;align-items:flex-start}
.msg-agent-av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.msg-agent-body{flex:1;min-width:0}
.msg-agent-name{font-size:12px;font-weight:500;margin-bottom:5px}
.msg-agent-text{font-size:14px;line-height:1.7;color:var(--text)}
.msg-agent-text pre{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;font-size:12px;font-family:var(--font-mono);margin:8px 0;white-space:pre-wrap;word-break:break-word}
.msg-agent-text code{background:var(--bg-sidebar);padding:2px 6px;border-radius:4px;font-size:12px;font-family:var(--font-mono)}
.msg-agent-text strong{font-weight:600}
.dispatch-row{display:flex;align-items:center;gap:8px;margin:4px 0 8px 44px;flex-wrap:wrap}
.dispatch-badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500}
.typing{display:flex;gap:4px;padding:4px 0;align-items:center}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-hint);animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.system-msg{text-align:center}
.system-badge{font-size:11px;color:var(--text-hint);background:var(--bg-sidebar);padding:3px 12px;border-radius:20px;border:1px solid var(--border)}
.input-area{padding:16px 24px 20px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.input-wrap{max-width:720px;margin:0 auto;position:relative}
.mode-banner{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:10px;font-size:12px;color:var(--text-muted)}
.mode-banner .close-btn{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:14px;padding:2px;margin-left:auto}
.input-box{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:14px 52px 14px 16px;font-size:14px;font-family:inherit;color:var(--text);outline:none;resize:none;min-height:52px;max-height:160px;overflow-y:auto;transition:border-color .2s;line-height:1.5}
.input-box:focus{border-color:var(--text-hint)}
.input-box::placeholder{color:var(--text-hint)}
.send-btn{position:absolute;right:10px;bottom:10px;width:34px;height:34px;border-radius:10px;border:none;background:var(--text);color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:opacity .2s}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.input-hint{text-align:center;font-size:11px;color:var(--text-hint);margin-top:8px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:150}
.mob-toggle{display:none;position:fixed;bottom:80px;left:16px;z-index:200;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;align-items:center;justify-content:center;font-size:18px;color:var(--text-muted)}
@media(max-width:680px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:160;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mob-toggle{display:flex}
  .overlay.show{display:block}
  .quick-grid{grid-template-columns:1fr}
}
.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:340px;max-width:90vw}
.login-logo{font-size:32px;text-align:center;margin-bottom:12px}
.login-title{font-size:18px;font-weight:500;text-align:center;color:var(--text);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text-hint);text-align:center;margin-bottom:28px}
.login-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;font-weight:500}
.login-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;margin-bottom:14px}
.login-input:focus{border-color:var(--text-hint)}
.login-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;font-family:inherit;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-err{font-size:12px;color:#a32d2d;text-align:center;margin-top:12px;display:none}
.login-err.show{display:block}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">⚡</div>
    <div class="login-title">Pentest Forge</div>
    <div class="login-sub">Cyber Squad — acesso restrito</div>
    <label class="login-label">Usuário</label>
    <input class="login-input" id="loginUser" type="text" placeholder="admin" autocomplete="off"/>
    <label class="login-label">Senha</label>
    <input class="login-input" id="loginPass" type="password" placeholder="••••••••"/>
    <button class="login-btn" id="loginBtn">Entrar</button>
    <div class="login-err" id="loginErr">Credenciais inválidas</div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-size:18px">⚡</span>
      <span class="sidebar-logo">Pentest Forge</span>
      <button class="icon-btn" onclick="toggleDark()" title="Tema">🌙</button>
    </div>
    <div style="padding:0 8px 8px">
      <button class="new-chat-btn" onclick="newChat()">
        <span style="font-size:18px">✏️</span> Novo chat
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Agentes</div>
      <div id="agentList"></div>
    </div>
    <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;min-height:0;margin-top:8px">
      <div class="sidebar-section-label">Histórico</div>
      <div class="history-section" id="historyList">
        <div style="font-size:12px;color:var(--text-hint);padding:8px 10px">Nenhuma sessão ainda.</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">EZEIA — Chat Geral</span>
      <div class="topbar-agent" id="topbarAgent">🧬 EZEIA</div>
      <button class="icon-btn" onclick="clearChat()" title="Limpar">🗑️</button>
    </div>
    <div class="messages" id="messagesDiv">
      <div class="messages-inner" id="messagesInner"></div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <div class="mode-banner" id="modeBanner" style="display:none">
          <span id="bannerIcon"></span>
          <span style="flex:1;margin-left:6px" id="bannerLabel"></span>
          <button class="close-btn" onclick="exitAgentMode()">✕</button>
        </div>
        <textarea class="input-box" id="inputBox" rows="1" placeholder="Mensagem..."></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter para enviar · Shift+Enter nova linha · apenas ambientes autorizados</div>
    </div>
  </div>
</div>

<button class="mob-toggle" onclick="toggleSidebar()">☰</button>

<script>

document.getElementById("loginUser").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("loginPass").focus(); });

function doLogin(){
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value;
  if(u===CREDS.user && p===CREDS.pass){
    sessionStorage.setItem("pf_auth","1");
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("app").style.display = "flex";
    boot();
  } else {
    const err = document.getElementById("loginErr");
    err.classList.add("show");
    document.getElementById("loginPass").value = "";
    setTimeout(()=>err.classList.remove("show"), 3000);
  }
}

function boot(){
  if(darkMode) document.body.classList.add("dark-mode");
  buildSidebar();
  renderMessages();
  renderHistory();
  document.getElementById("inputBox").focus();
}

if(sessionStorage.getItem("pf_auth")==="1"){
  document.getElementById("loginWrap").style.display = "none";
  document.getElementById("app").style.display = "flex";
  boot();
}

function toggleDark(){
  darkMode = !darkMode;
  document.body.classList.toggle("dark-mode", darkMode);
  localStorage.setItem("pf_dark", darkMode?"1":"0");
}

function buildSidebar(){
  const list = document.getElementById("agentList");
  list.innerHTML = "";
  ["core","red","spec"].forEach(team => {
    const agents = AGENTS.filter(a => a.team === team);
    if(!agents.length) return;
    const lbl = document.createElement("div");
    lbl.style.cssText = "font-size:10px;color:var(--text-hint);padding:8px 10px 3px;font-weight:500;letter-spacing:.3px;text-transform:uppercase";
    lbl.textContent = TEAM_LABELS[team];
    list.appendChild(lbl);
    agents.forEach(agent => {
      const btn = document.createElement("button");
      btn.className = "agent-item";
      btn.id = "agent-btn-" + agent.id;
      btn.innerHTML = `
        <div class="agent-icon" style="background:${agent.bg}">${agent.icon}</div>
        <div class="agent-item-info">
          <div class="agent-item-name">${agent.name}</div>
          <div class="agent-item-role">${agent.role}</div>
        </div>
        <div class="online-dot"></div>
      `;
      btn.onclick = () => selectAgent(agent.id);
      list.appendChild(btn);
    });
  });
  updateSidebarActive();
}

function updateSidebarActive(){
  document.querySelectorAll(".agent-item").forEach(el => el.classList.remove("active"));
  const activeId = chatMode==="general" ? "dispatch" : selectedAgentId;
  const btn = document.getElementById("agent-btn-" + activeId);
  if(btn) btn.classList.add("active");
}

function selectAgent(id){
  if(id==="dispatch"){ chatMode="general"; selectedAgentId="dispatch"; }
  else { chatMode="agent"; selectedAgentId=id; }
  updateTopbar(); updateBanner(); updateSidebarActive(); renderMessages(); renderHistory(); closeSidebar();
}

function updateTopbar(){
  const agent = AGENT_MAP[selectedAgentId] || AGENT_MAP["dispatch"];
  document.getElementById("topbarTitle").textContent = chatMode==="general" ? "EZEIA — Chat Geral" : agent.name + " — Chat individual";
  document.getElementById("topbarAgent").textContent = agent.icon + " " + agent.name;
}

function updateBanner(){
  const banner = document.getElementById("modeBanner");
  if(chatMode==="agent"){
    const agent = AGENT_MAP[selectedAgentId];
    document.getElementById("bannerIcon").textContent = agent.icon;
    document.getElementById("bannerLabel").textContent = agent.name + " — chat individual";
    banner.style.display = "flex";
  } else { banner.style.display = "none"; }
}

function exitAgentMode(){ chatMode="general"; selectedAgentId="dispatch"; updateTopbar(); updateBanner(); updateSidebarActive(); renderMessages(); }

function renderHistory(){
  const el = document.getElementById("historyList");
  el.innerHTML = "";
  const agentItems = Object.keys(agentChats).filter(id=>agentChats[id]?.length>0).map(id=>({id:"agent_"+id,agentId:id,isAgent:true}));
  if(!sessions.length && !agentItems.length){
    el.innerHTML='<div style="font-size:12px;color:var(--text-hint);padding:8px 10px">Nenhuma sessão ainda.</div>'; return;
  }
  sessions.forEach(s=>{
    const div=document.createElement("div");
    div.className="history-item"+(s.id===currentSessionId&&chatMode==="general"?" active":"");
    div.innerHTML=`<div class="history-date">${s.date}</div><div class="history-preview">${escapeHtml(s.preview)}</div>`;
    div.onclick=()=>{ currentSessionId=s.id; messages=s.messages; chatMode="general"; selectedAgentId="dispatch"; updateTopbar(); updateBanner(); updateSidebarActive(); renderMessages(); };
    el.appendChild(div);
  });
  if(agentItems.length){
    const lbl=document.createElement("div");
    lbl.style.cssText="font-size:10px;color:var(--text-hint);padding:12px 10px 3px;font-weight:500;letter-spacing:.3px;text-transform:uppercase";
    lbl.textContent="Chats individuais"; el.appendChild(lbl);
    agentItems.forEach(s=>{
      const agent=AGENT_MAP[s.agentId]; if(!agent) return;
      const msgs=agentChats[s.agentId];
      const div=document.createElement("div");
      div.className="history-item"+(chatMode==="agent"&&selectedAgentId===s.agentId?" active":"");
      div.innerHTML=`<div class="history-date" style="color:${agent.color}">${agent.icon} ${agent.name}</div><div class="history-preview">${msgs.length} mensagens</div>`;
      div.onclick=()=>selectAgent(s.agentId); el.appendChild(div);
    });
  }
}

function renderMessages(){
  const inner=document.getElementById("messagesInner");
  inner.innerHTML="";
  const currentMsgs=chatMode==="agent"?(agentChats[selectedAgentId]||[]):messages;
  const agent=AGENT_MAP[selectedAgentId]||AGENT_MAP["dispatch"];
  if(!currentMsgs.length){
    const w=document.createElement("div"); w.className="welcome";
    w.innerHTML=`
      <div class="welcome-icon">${chatMode==="agent"?agent.icon:"🧬"}</div>
      <div class="welcome-title">${chatMode==="agent"?agent.name:"EZEIA Pentest Squad"}</div>
      <div class="welcome-sub">${chatMode==="agent"?agent.role:"Descreva sua situação — o dispatcher escolhe o agente certo e entrega respostas técnicas detalhadas."}</div>
      ${chatMode==="general"?'<div class="quick-grid" id="quickGrid"></div>':""}
    `;
    inner.appendChild(w);
    if(chatMode==="general"){
      const grid=document.getElementById("quickGrid");
      QUICK.forEach(q=>{
        const btn=document.createElement("button"); btn.className="quick-card"; btn.textContent=q;
        btn.onclick=()=>{ document.getElementById("inputBox").value=q; document.getElementById("sendBtn").disabled=false; document.getElementById("inputBox").focus(); };
        grid.appendChild(btn);
      });
    }
  } else { currentMsgs.forEach((msg,i)=>renderMsg(msg,i,inner)); }
  if(loading){
    const row=document.createElement("div"); row.className="msg-agent";
    row.innerHTML=`
      <div class="msg-agent-av" style="background:${agent.bg}">${agent.icon}</div>
      <div class="msg-agent-body">
        <div class="msg-agent-name" style="color:${agent.color}">${agent.name}</div>
        <div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
      </div>
    `;
    inner.appendChild(row);
  }
  document.getElementById("messagesDiv").scrollTop=999999;
}

function renderMsg(msg,i,container){
  if(msg.type==="system"){
    const d=document.createElement("div"); d.className="system-msg";
    d.innerHTML=`<span class="system-badge">${escapeHtml(msg.content)}</span>`; container.appendChild(d); return;
  }
  if(msg.type==="user"){
    const d=document.createElement("div"); d.className="msg-user";
    d.innerHTML=`<div class="msg-user-bubble">${escapeHtml(msg.content)}</div>`; container.appendChild(d); return;
  }
  if(msg.type==="agent"){
    const a=AGENT_MAP[msg.agentId]||AGENT_MAP["dispatch"];
    const d=document.createElement("div"); d.className="msg-agent";
    d.innerHTML=`
      <div class="msg-agent-av" style="background:${a.bg}">${a.icon}</div>
      <div class="msg-agent-body">
        <div class="msg-agent-name" style="color:${a.color}">${a.name} · ${a.role}</div>
        <div class="msg-agent-text">${renderMD(msg.content)}</div>
      </div>
    `;
    container.appendChild(d); return;
  }
  if(msg.type==="dispatch"){
    if(msg.agents?.length){
      const row=document.createElement("div"); row.className="dispatch-row";
      row.innerHTML=msg.agents.map(id=>{
        const a=AGENT_MAP[id]; if(!a) return "";
        return `<span class="dispatch-badge" style="background:${a.bg};color:${a.color}">${a.icon} ${a.name}</span>`;
      }).join("")+'<span style="font-size:11px;color:var(--text-hint);margin-left:4px">ativados</span>';
      container.appendChild(row);
    }
    (msg.conversation||[]).forEach(conv=>{
      const a=AGENT_MAP[conv.agent]||AGENT_MAP["dispatch"];
      const d=document.createElement("div"); d.className="msg-agent";
      d.innerHTML=`
        <div class="msg-agent-av" style="background:${a.bg}">${a.icon}</div>
        <div class="msg-agent-body">
          <div class="msg-agent-name" style="color:${a.color}">${a.name} · ${a.role}</div>
          <div class="msg-agent-text">${renderMD(conv.message)}</div>
        </div>
      `;
      container.appendChild(d);
    });
  }
}

// ============= API GROQ COM MAX TOKENS AJUSTADO =============
async function callGroq(history, system){
  const res=await fetch("/api/groq",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ 
      messages:history, 
      system:system, 
      model:"llama-3.3-70b-versatile", 
      temperature:0.3, 
      max_tokens:4000
    })
  });
  const data=await res.json();
  if(data.error) throw new Error(typeof data.error==='string'?data.error:JSON.stringify(data.error));
  return data.content?.[0]?.text||"";
}

async function sendMessage(){
  const input=document.getElementById("inputBox");
  const text=input.value.trim();
  if(!text||loading) return;
  input.value=""; input.style.height="auto";
  document.getElementById("sendBtn").disabled=true;
  loading=true;

  if(chatMode==="agent"){
    const prev=agentChats[selectedAgentId]||[];
    const updated=[...prev,{type:"user",content:text}];
    agentChats[selectedAgentId]=updated; renderMessages();
    const history=updated.map(m=>({role:m.type==="user"?"user":"assistant",content:m.content}));
    try {
      const reply=await callGroq(history,SYSTEM[selectedAgentId]||SYSTEM.dispatch);
      agentChats[selectedAgentId]=[...updated,{type:"agent",agentId:selectedAgentId,content:reply}];
      localStorage.setItem("pf_agent_chats",JSON.stringify(agentChats));
    } catch(e){
      console.error(e);
      agentChats[selectedAgentId]=[...updated,{type:"agent",agentId:"dispatch",content:"❌ Erro de conexão com a API Groq. Verifique o worker /api/groq e a chave GROQ_API_KEY."}];
    }
    loading=false; renderMessages(); renderHistory(); return;
  }

  messages.push({type:"user",content:text}); renderMessages();
  const history=messages.filter(m=>m.type==="user"||m.type==="dispatch").slice(-12)
    .map(m=>m.type==="user"?{role:"user",content:m.content}:{role:"assistant",content:m.raw||"..."});

  try {
    const raw=await callGroq(history,SYSTEM.dispatch);
    let parsed;
    try { const match=raw.match(/\{[\s\S]*\}/); parsed=JSON.parse(match?.[0]||raw); }
    catch { parsed={agents:["dispatch"],conversation:[{agent:"dispatch",message:raw}]}; }
    const dispatchMsg={type:"dispatch",agents:parsed.agents||[],conversation:parsed.conversation||[],raw};
    messages.push(dispatchMsg);
    const sessionData={id:currentSessionId,date:new Date().toLocaleDateString("pt-BR"),preview:text.slice(0,55),messages:[...messages]};
    sessions=[sessionData,...sessions.filter(s=>s.id!==currentSessionId)].slice(0,30);
    localStorage.setItem("pf_sessions",JSON.stringify(sessions));
  } catch(e){
    console.error(e);
    messages.push({type:"dispatch",agents:["dispatch"],conversation:[{agent:"dispatch",message:"❌ Erro de conexão com a API Groq. Verifique o worker /api/groq e a chave GROQ_API_KEY."}]});
  }
  loading=false; renderMessages(); renderHistory();
}

function newChat(){ currentSessionId=Date.now().toString(); messages=[]; chatMode="general"; selectedAgentId="dispatch"; updateTopbar(); updateBanner(); updateSidebarActive(); renderMessages(); }

function clearChat(){
  if(!confirm("Limpar esta conversa?")) return;
  if(chatMode==="agent"){ agentChats[selectedAgentId]=[]; localStorage.setItem("pf_agent_chats",JSON.stringify(agentChats)); }
  else { messages=[]; sessions=sessions.filter(s=>s.id!==currentSessionId); localStorage.setItem("pf_sessions",JSON.stringify(sessions)); }
  renderMessages(); renderHistory();
}

function escapeHtml(t){ return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderMD(text){
  if(!text) return "";
  let t=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  t=t.replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>`<pre>${c}</pre>`);
  t=t.replace(/`([^`]+)`/g,"<code>$1</code>");
  t=t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  t=t.replace(/^#{1,3} (.+)$/gm,"<div style='font-size:14px;font-weight:600;color:var(--text);margin:10px 0 4px'>$1</div>");
  t=t.replace(/^[-*] (.+)$/gm,"<div style='padding-left:14px;margin:3px 0'>▸ $1</div>");
  t=t.replace(/\n\n/g,"<br/><br/>").replace(/\n/g,"<br/>");
  return t;
}

const inputBox=document.getElementById("inputBox");
const sendBtn=document.getElementById("sendBtn");
inputBox.addEventListener("input",function(){ sendBtn.disabled=!this.value.trim(); this.style.height="auto"; this.style.height=Math.min(this.scrollHeight,160)+"px"; });
inputBox.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
sendBtn.onclick=sendMessage;

function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
function closeSidebar(){ document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
</script>
