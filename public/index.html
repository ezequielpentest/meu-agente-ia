function initLogin() {
  const loginContainer = document.getElementById('loginContainer');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  
  function showError() {
    errorMsg.classList.add('show');
    usernameInput.style.borderColor = '#ff4444';
    passwordInput.style.borderColor = '#ff4444';
    setTimeout(() => {
      errorMsg.classList.remove('show');
      usernameInput.style.borderColor = '';
      passwordInput.style.borderColor = '';
    }, 3000);
  }
  
  function attemptLogin() {
    const user = usernameInput.value.trim();
    const pass = passwordInput.value;
    
    if (user === VALID_CREDENTIALS.username && pass === VALID_CREDENTIALS.password) {
      // Login bem-sucedido
      document.body.classList.add('app-loaded');
      // Inicializa o app React
      initApp();
    } else {
      showError();
      passwordInput.value = '';
      passwordInput.focus();
    }
  }
  
  loginBtn.addEventListener('click', attemptLogin);
  
  usernameInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') passwordInput.focus();
  });
  
  passwordInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') attemptLogin();
  });
  
  // Foco inicial
  usernameInput.focus();
}

async function callAPI(messages) {
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1500,
      system: DISPATCHER_SYSTEM,
      messages,
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || data.error);
  return data.content?.[0]?.text || "";
}

function renderMD(text) {
  if (!text) return '';
  let t = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) => '<pre>' + c + '</pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<b style="color:#00ff88">$1</b>');
  t = t.replace(/\*(.+?)\*/g, '<i>$1</i>');
  t = t.replace(/^#{1,3} (.+)$/gm, '<div class="md-h">$1</div>');
  t = t.replace(/^- (.+)$/gm, '<div class="md-li">▸ $1</div>');
  t = t.replace(/^\d+\. (.+)$/gm, (_,i) => '<div class="md-li">◦ '+i+'</div>');
  t = t.replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>');
  return t;
}

            h('input', { value: search, onChange: e => setSearch(e.target.value), placeholder: 'buscar agente...', style: { width: '100%', background: '#0a0a0f', border: '1px solid #0a2a0a', borderRadius: 4, padding: '5px 8px', color: '#668866', fontSize: 10, fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box' } })
          ),
          h('div', { style: { flex: 1, overflowY: 'auto' } },
            ...TEAM_ORDER.map(team => {
              const agents = filteredAgents.filter(a => a.team === team);
              if (!agents.length) return null;
              return h('div', { key: team },
                h('div', { style: { padding: '8px 10px 4px', fontSize: 8, color: TEAM_COLORS[team], letterSpacing: 2, opacity: 0.7 } }, TEAM_LABELS[team]),
                ...agents.map(agent => {
                  const isActive = activeAgents.some(a => a.id === agent.id);
                  return h('div', { key: agent.id, style: { display: 'flex', alignItems: 'center', gap: 7, padding: '7px 10px', background: isActive ? agent.color + '10' : 'transparent', borderLeft: isActive ? `2px solid ${agent.color}` : '2px solid transparent', transition: 'all 0.15s' } },
                    h('div', { style: { width: 22, height: 22, borderRadius: 4, background: agent.color + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, flexShrink: 0 } }, agent.icon),
                    h('div', { style: { overflow: 'hidden', flex: 1 } },
                      h('div', { style: { fontSize: 11, color: isActive ? agent.color : '#667766', fontWeight: 'bold', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, agent.name),
                      h('div', { style: { fontSize: 9, color: '#334433', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, agent.role)
                    ),
                    isActive && h('div', { className: 'pulse', style: { width: 5, height: 5, borderRadius: '50%', background: agent.color, flexShrink: 0, boxShadow: `0 0 4px ${agent.color}` } })
                  );
                })
              );
            })
          )
        ) : h('div', { style: { flex: 1, overflowY: 'auto', padding: 10 } },
          h('div', { style: { fontSize: 9, color: '#8844ee', letterSpacing: 2, marginBottom: 12 } }, '◆ GITHUB REPOS'),
          ...REPOS.map(repo =>
            h('div', { key: repo.name, style: { background: '#0a0a14', border: '1px solid #1a1a3a', borderRadius: 8, padding: 10, marginBottom: 8 } },
              h('div', { style: { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 } }, h('span', null, '🐙'), h('span', { style: { fontSize: 10, color: '#8844ee', fontWeight: 'bold' } }, repo.name)),
              h('div', { style: { fontSize: 9, color: '#445', marginBottom: 8 } }, repo.desc),
              h('div', { style: { display: 'flex', gap: 6 } },
                h('a', { href: repo.url, target: '_blank', rel: 'noopener noreferrer', style: { fontSize: 9, color: '#8844ee', textDecoration: 'none', border: '1px solid #8844ee44', borderRadius: 3, padding: '2px 6px' } }, '↗ abrir'),
                h('button', { onClick: () => { setInput(repo.prompt); inputRef.current?.focus(); }, style: { fontSize: 9, color: '#00ff88', background: 'none', border: '1px solid #00ff8833', borderRadius: 3, padding: '2px 6px', cursor: 'pointer', fontFamily: 'inherit' } }, '+ gerar conteúdo')
              )
            )
          )
        )
      ),
      h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' } },
        h('div', { style: { flex: 1, overflowY: 'auto', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 16 } },
          messages.length === 1 && h('div', { style: { marginTop: 20 } },
            h('div', { style: { textAlign: 'center', marginBottom: 24 } },
              h('div', { style: { fontSize: 40, marginBottom: 8 } }, '🧬'),
              h('div', { style: { fontSize: 14, color: '#00ff88', fontFamily: "'Orbitron',monospace", letterSpacing: 2, marginBottom: 6 } }, 'NEXUS DISPATCHER'),
              h('div', { style: { fontSize: 11, color: '#445', lineHeight: 1.8 } }, 'Descreva sua situação. O sistema identifica o agente ideal automaticamente.')
            ),
            h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, maxWidth: 600, margin: '0 auto' } },
              ...QUICK_PROMPTS.map(p => h('button', { key: p, className: 'quick-btn', onClick: () => { setInput(p); inputRef.current?.focus(); }, style: { background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 8, padding: '10px 12px', cursor: 'pointer', textAlign: 'left', fontSize: 11, color: '#556677', fontFamily: 'inherit', lineHeight: 1.5, transition: 'all 0.2s' } }, p))
            )
          ),
          ...messages.map((msg, idx) => {
            if (msg.type === 'system') return h('div', { key: idx, style: { textAlign: 'center' } }, h('span', { style: { fontSize: 10, color: '#334433', background: '#0a1a0a', padding: '3px 12px', borderRadius: 20, border: '1px solid #0a2a0a' } }, `🧬 ${msg.content}`));
            if (msg.type === 'user') return h('div', { key: idx, style: { display: 'flex', justifyContent: 'flex-end' } }, h('div', { style: { maxWidth: '70%', background: '#0a1a0a', border: '1px solid #1a3a1a', borderRadius: '10px 2px 10px 10px', padding: '10px 14px', fontSize: 12, color: '#aaccaa', lineHeight: 1.7 } }, msg.content));
            if (msg.type === 'agent_conversation') {
              const convAgents = (msg.agents || []).map(id => AGENT_MAP[id]).filter(Boolean);
              return h('div', { key: idx, className: 'agent-msg', style: { display: 'flex', flexDirection: 'column', gap: 12 } },
                convAgents.length > 0 && h('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
                  h('div', { style: { height: 1, flex: 1, background: 'linear-gradient(90deg,transparent,#0a2a0a)' } }),
                  h('div', { style: { display: 'flex', gap: 6, alignItems: 'center' } }, h('span', { style: { fontSize: 9, color: '#334433' } }, 'NEXUS → '), ...convAgents.map(a => h('span', { key: a.id, style: { fontSize: 9, padding: '2px 8px', borderRadius: 10, background: a.color + '15', color: a.color, border: `1px solid ${a.color}30` } }, `${a.icon} ${a.name}`))),
                  h('div', { style: { height: 1, flex: 1, background: 'linear-gradient(90deg,#0a2a0a,transparent)' } })
                ),
                ...(msg.conversation || []).map((conv, ci) => {
                  const agent = AGENT_MAP[conv.agent] || AGENT_MAP['dispatch'];
                  return h('div', { key: ci, style: { display: 'flex', gap: 10, alignItems: 'flex-start' } },
                    h('div', { style: { width: 34, height: 34, borderRadius: 8, flexShrink: 0, background: `linear-gradient(135deg,${agent.color}20,${agent.color}10)`, border: `1px solid ${agent.color}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, boxShadow: `0 0 10px ${agent.color}20` } }, agent.icon),
                    h('div', { style: { flex: 1, background: '#08080e', border: `1px solid ${agent.color}25`, borderRadius: '2px 10px 10px 10px', padding: '10px 14px', boxShadow: `inset 0 0 20px ${agent.color}05` } },
                      h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 } }, h('span', { style: { fontSize: 10, color: agent.color, fontWeight: 'bold', letterSpacing: 1, fontFamily: "'Orbitron',monospace" } }, agent.name), h('span', { style: { fontSize: 9, color: '#334433' } }, '•'), h('span', { style: { fontSize: 9, color: '#445' } }, agent.role), h('div', { className: 'pulse', style: { width: 4, height: 4, borderRadius: '50%', background: agent.color, marginLeft: 'auto', boxShadow: `0 0 4px ${agent.color}` } })),
                      h('div', { dangerouslySetInnerHTML: { __html: renderMD(conv.message) }, style: { fontSize: 12, color: '#b0c0b0', lineHeight: 1.8 } })
                    )
                  );
                })
              );
            }
            return null;
          }),
          loading && h('div', { style: { display: 'flex', gap: 10, alignItems: 'flex-start' } },
            h('div', { style: { width: 34, height: 34, borderRadius: 8, background: '#00ff8815', border: '1px solid #00ff8840', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 } }, '🧬'),
            h('div', { style: { background: '#08080e', border: '1px solid #00ff8820', borderRadius: '2px 10px 10px 10px', padding: '10px 14px' } },
              h('div', { style: { fontSize: 10, color: '#00ff88', marginBottom: 6, fontFamily: "'Orbitron',monospace", letterSpacing: 1 } }, 'NEXUS'),
              h('div', { style: { display: 'flex', gap: 4, alignItems: 'center' } }, ...[0,1,2].map(i => h('div', { key: i, className: 'pulse', style: { width: 6, height: 6, borderRadius: '50%', background: '#00ff88', animationDelay: `${i*0.2}s` } })), h('span', { style: { fontSize: 11, color: '#334433', marginLeft: 8 } }, 'identificando agente...'))
            )
          ),
          h('div', { ref: bottomRef })
        ),
        h('div', { style: { padding: '12px 20px', background: '#050508', borderTop: '1px solid #0a2a0a', flexShrink: 0 } },
          h('div', { style: { display: 'flex', gap: 10 } },
            h('div', { style: { position: 'relative', flex: 1 } },
              h('span', { style: { position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', fontSize: 12, color: '#00ff8844' } }, '▶'),
              h('input', { ref: inputRef, value: input, onChange: e => setInput(e.target.value), onKeyDown: e => e.key === 'Enter' && !e.shiftKey && sendMessage(), placeholder: 'Descreva sua situação — NEXUS identifica o agente ideal...', style: { width: '100%', background: '#08080e', border: '1px solid #0a2a0a', borderRadius: 8, padding: '11px 14px 11px 30px', color: '#aaccaa', fontSize: 12, fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box' } })
            ),
            h('button', { onClick: sendMessage, disabled: loading, style: { padding: '11px 22px', borderRadius: 8, border: '1px solid #00ff8840', background: loading ? '#08080e' : 'linear-gradient(135deg,#001a00,#0a2a0a)', color: loading ? '#334433' : '#00ff88', cursor: loading ? 'not-allowed' : 'pointer', fontSize: 11, fontFamily: "'Orbitron',monospace", fontWeight: 'bold', letterSpacing: 2, transition: 'all 0.2s' } }, loading ? '...' : 'ENVIAR')
          ),
          h('div', { style: { fontSize: 9, color: '#223322', marginTop: 6, textAlign: 'center', letterSpacing: 1 } }, 'ENTER para enviar • apenas ambientes autorizados, CTFs e labs')
        )
      )
    )
  );
}

function initApp() {
  createRoot(document.getElementById('root')).render(h(App));
}

// Inicia o sistema de login
initLogin();
</script>
</body>
</html>
